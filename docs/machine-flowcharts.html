<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VendHub OS — Блок-схемы автоматов</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-2: #242836;
    --border: #2e3346;
    --text: #e8eaf0;
    --text-dim: #8b8fa3;
    --accent: #c49a6c;
    --accent-glow: rgba(196, 154, 108, 0.15);
    --green: #4ade80;
    --blue: #60a5fa;
    --amber: #fbbf24;
    --red: #f87171;
    --purple: #a78bfa;
    --cyan: #22d3ee;
    --test-badge: #f59e0b;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  .layout {
    display: grid;
    grid-template-columns: 280px 1fr;
    min-height: 100vh;
  }

  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .sidebar-header {
    padding: 0 20px 20px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-header h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; color: var(--accent); }
  .sidebar-header p { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

  .nav-group { padding: 16px 12px 8px; }
  .nav-group-title {
    font-size: 10px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--text-dim); padding: 0 8px; margin-bottom: 6px;
  }

  .nav-item {
    display: flex; align-items: center; gap: 10px; padding: 8px 12px;
    border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500;
    color: var(--text-dim); transition: all 0.15s; user-select: none;
  }
  .nav-item:hover { background: var(--surface-2); color: var(--text); }
  .nav-item.active { background: var(--accent-glow); color: var(--accent); }
  .nav-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .main { padding: 40px; overflow-y: auto; }

  .flow-title { font-size: 24px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 6px; }
  .flow-desc { font-size: 14px; color: var(--text-dim); margin-bottom: 32px; max-width: 600px; }

  .flowchart { display: flex; flex-direction: column; align-items: center; gap: 0; }

  .flow-node {
    position: relative; min-width: 260px; max-width: 400px; padding: 14px 20px;
    border-radius: 12px; font-size: 13px; font-weight: 500; text-align: center;
    border: 1.5px solid var(--border); background: var(--surface);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .flow-node:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }

  .flow-node.start, .flow-node.end {
    border-radius: 40px; background: var(--surface-2); border-color: var(--accent); color: var(--accent); font-weight: 600;
  }
  .flow-node.process { border-color: var(--blue); background: rgba(96,165,250,0.08); }
  .flow-node.decision { border-color: var(--amber); background: rgba(251,191,36,0.08); min-width: 280px; }
  .flow-node.action { border-color: var(--green); background: rgba(74,222,128,0.08); }
  .flow-node.error { border-color: var(--red); background: rgba(248,113,113,0.08); }
  .flow-node.api { border-color: var(--purple); background: rgba(167,139,250,0.08); font-family: 'JetBrains Mono', monospace; font-size: 12px; }
  .flow-node.ui { border-color: var(--cyan); background: rgba(34,211,238,0.08); }
  .flow-node.test-data { border: 2px dashed var(--test-badge); background: rgba(245,158,11,0.06); }

  .node-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; opacity: 0.7; }
  .node-detail { font-size: 11px; color: var(--text-dim); margin-top: 4px; font-weight: 400; white-space: pre-line; }

  .flow-arrow { display: flex; flex-direction: column; align-items: center; height: 36px; position: relative; }
  .flow-arrow .line { width: 2px; flex: 1; background: var(--border); }
  .flow-arrow .arrow-head { width: 0; height: 0; border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 8px solid var(--border); }
  .flow-arrow .arrow-label { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--text-dim); font-style: italic; white-space: nowrap; }

  .flow-branch { display: flex; gap: 40px; align-items: flex-start; justify-content: center; }
  .flow-branch-col { display: flex; flex-direction: column; align-items: center; }
  .flow-branch-label { font-size: 11px; font-weight: 600; color: var(--text-dim); margin-bottom: 8px; padding: 3px 10px; border-radius: 20px; background: var(--surface-2); }
  .flow-branch-label.yes { color: var(--green); }
  .flow-branch-label.no { color: var(--red); }

  .legend {
    display: flex; flex-wrap: wrap; gap: 16px; margin-top: 40px; padding: 16px 20px;
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-dim); }
  .legend-swatch { width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid; }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .main { padding: 20px; }
  }
</style>
</head>
<body>

<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1>VendHub OS</h1>
      <p>Блок-схемы автоматов</p>
    </div>
    <div class="nav-group">
      <div class="nav-group-title">Создание</div>
      <div class="nav-item active" data-flow="create-manual"><div class="nav-dot" style="background:var(--green)"></div>Создание вручную</div>
      <div class="nav-item" data-flow="create-template"><div class="nav-dot" style="background:var(--blue)"></div>Создание из шаблона</div>
    </div>
    <div class="nav-group">
      <div class="nav-group-title">Просмотр</div>
      <div class="nav-item" data-flow="view-list"><div class="nav-dot" style="background:var(--cyan)"></div>Список автоматов</div>
      <div class="nav-item" data-flow="view-detail"><div class="nav-dot" style="background:var(--purple)"></div>Детальная карточка</div>
    </div>
    <div class="nav-group">
      <div class="nav-group-title">Наполнение</div>
      <div class="nav-item" data-flow="contents-bunkers"><div class="nav-dot" style="background:var(--amber)"></div>Бункеры (containers)</div>
      <div class="nav-item" data-flow="contents-slots"><div class="nav-dot" style="background:var(--accent)"></div>Ячейки (slots)</div>
    </div>
    <div class="nav-group">
      <div class="nav-group-title">Компоненты</div>
      <div class="nav-item" data-flow="components"><div class="nav-dot" style="background:var(--red)"></div>Оборудование</div>
    </div>
    <div class="nav-group">
      <div class="nav-group-title">Шаблоны</div>
      <div class="nav-item" data-flow="templates-crud"><div class="nav-dot" style="background:var(--green)"></div>CRUD шаблонов</div>
    </div>
    <div class="nav-group">
      <div class="nav-group-title">Тестовые данные</div>
      <div class="nav-item" data-flow="test-data"><div class="nav-dot" style="background:var(--test-badge)"></div>Обзор тестовых данных</div>
    </div>
  </nav>

  <main class="main" id="main-content"></main>
</div>

<script>
const LABEL_MAP = {
  'start': 'СТАРТ', 'end': 'КОНЕЦ', 'process': 'ПРОЦЕСС',
  'decision': 'РЕШЕНИЕ', 'action': 'ДЕЙСТВИЕ', 'error': 'ОШИБКА',
  'api': 'API', 'ui': 'UI', 'test-data': 'ТЕСТОВЫЕ ДАННЫЕ'
};

function el(tag, cls, attrs) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'text') e.textContent = v;
    else e.setAttribute(k, v);
  });
  return e;
}

function buildNode(node) {
  if (node.type === 'arrow') {
    const a = el('div', 'flow-arrow');
    a.appendChild(el('div', 'line'));
    a.appendChild(el('div', 'arrow-head'));
    if (node.label) {
      const lbl = el('div', 'arrow-label');
      lbl.textContent = node.label;
      a.appendChild(lbl);
    }
    return a;
  }

  if (node.type === 'branch') {
    const br = el('div', 'flow-branch');

    const yesCol = el('div', 'flow-branch-col');
    const yesLbl = el('div', 'flow-branch-label yes');
    yesLbl.textContent = 'Да';
    yesCol.appendChild(yesLbl);
    if (Array.isArray(node.yes)) node.yes.forEach(n => yesCol.appendChild(buildNode(n)));
    else if (node.yes && node.yes.label) {
      const ref = el('div', 'flow-node action');
      ref.textContent = node.yes.label;
      ref.style.fontSize = '12px';
      yesCol.appendChild(ref);
    }
    br.appendChild(yesCol);

    const noCol = el('div', 'flow-branch-col');
    const noLbl = el('div', 'flow-branch-label no');
    noLbl.textContent = 'Нет';
    noCol.appendChild(noLbl);
    if (Array.isArray(node.no)) node.no.forEach(n => noCol.appendChild(buildNode(n)));
    br.appendChild(noCol);

    return br;
  }

  const box = el('div', 'flow-node ' + node.type);
  const label = el('div', 'node-label');
  label.textContent = LABEL_MAP[node.type] || '';
  box.appendChild(label);

  const txt = document.createTextNode(node.text || '');
  box.appendChild(txt);

  if (node.detail) {
    const d = el('div', 'node-detail');
    d.textContent = node.detail;
    box.appendChild(d);
  }
  return box;
}

function buildLegend() {
  const legend = el('div', 'legend');
  const items = [
    ['var(--accent)', 'var(--surface-2)', 'solid', 'Старт / Конец'],
    ['var(--blue)', 'rgba(96,165,250,0.08)', 'solid', 'Процесс'],
    ['var(--amber)', 'rgba(251,191,36,0.08)', 'solid', 'Решение'],
    ['var(--green)', 'rgba(74,222,128,0.08)', 'solid', 'Действие'],
    ['var(--purple)', 'rgba(167,139,250,0.08)', 'solid', 'API вызов'],
    ['var(--cyan)', 'rgba(34,211,238,0.08)', 'solid', 'UI элемент'],
    ['var(--red)', 'rgba(248,113,113,0.08)', 'solid', 'Ошибка'],
    ['var(--test-badge)', 'rgba(245,158,11,0.06)', 'dashed', 'Тестовые данные'],
  ];
  items.forEach(([bc, bg, bs, label]) => {
    const li = el('div', 'legend-item');
    const sw = el('div', 'legend-swatch');
    sw.style.borderColor = bc;
    sw.style.background = bg;
    sw.style.borderStyle = bs;
    li.appendChild(sw);
    const sp = document.createTextNode(label);
    li.appendChild(sp);
    legend.appendChild(li);
  });
  return legend;
}

function showFlow(key) {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const navEl = document.querySelector('[data-flow="' + key + '"]');
  if (navEl) navEl.classList.add('active');

  const flow = FLOWS[key];
  if (!flow) return;

  const main = document.getElementById('main-content');
  main.replaceChildren();

  const title = el('h2', 'flow-title');
  title.textContent = flow.title;
  main.appendChild(title);

  const desc = el('p', 'flow-desc');
  desc.textContent = flow.desc;
  main.appendChild(desc);

  const chart = el('div', 'flowchart');
  flow.nodes.forEach(node => chart.appendChild(buildNode(node)));
  main.appendChild(chart);
  main.appendChild(buildLegend());
}
