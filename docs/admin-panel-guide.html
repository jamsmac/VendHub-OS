<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VendHub OS — Гид по админ-панели</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#faf6f1;--bg2:#f3ece3;--bg3:#ebe2d5;
--text:#3d2c1e;--text2:#6b5344;--text3:#917a69;
--accent:#c0703a;--accent2:#d4944e;--accent3:#e8b87a;
--green:#4a9d6e;--yellow:#c49a3c;--red:#c45a4a;
--card:#fff;--border:#e0d5c8;--shadow:0 2px 12px rgba(61,44,30,.08);
--radius:12px;--sidebar-w:280px;
}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow:hidden;height:100vh}
h1,h2,h3,h4{font-family:'Playfair Display',serif;color:var(--text);font-weight:600}
.app{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:linear-gradient(180deg,#3d2c1e 0%,#2a1e14 100%);color:#e8ddd0;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:6px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
.sidebar-header{padding:20px;border-bottom:1px solid rgba(255,255,255,.1);text-align:center}
.sidebar-header h1{font-size:18px;color:#e8b87a;letter-spacing:1px}
.sidebar-header p{font-size:11px;color:rgba(255,255,255,.5);margin-top:4px}

.sidebar-controls{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-controls input{width:100%;padding:8px 12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#e8ddd0;font-size:13px;outline:none;transition:.2s}
.sidebar-controls input:focus{border-color:var(--accent);background:rgba(255,255,255,.12)}
.sidebar-controls input::placeholder{color:rgba(255,255,255,.35)}
.role-filter{margin-top:8px}
.role-filter select{width:100%;padding:7px 10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#e8ddd0;font-size:12px;outline:none;cursor:pointer}
.role-filter select option{background:#2a1e14;color:#e8ddd0}

.sidebar-nav{flex:1;padding:8px 0}
.nav-section{padding:4px 16px 2px;margin-top:8px}
.nav-section-title{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.35);font-weight:600}
.nav-item{display:flex;align-items:center;padding:8px 16px;cursor:pointer;transition:.15s;font-size:13px;border-left:3px solid transparent;gap:10px}
.nav-item:hover{background:rgba(255,255,255,.06)}
.nav-item.active{background:rgba(192,112,58,.2);border-left-color:var(--accent);color:#e8b87a}
.nav-item .icon{width:18px;text-align:center;font-size:14px;opacity:.7}
.nav-item .label{flex:1}
.nav-item .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-dot.green{background:var(--green)}
.status-dot.yellow{background:var(--yellow)}
.status-dot.red{background:var(--red)}
.nav-item.hidden{display:none}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:0}
.main::-webkit-scrollbar{width:8px}
.main::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}

/* STATS BAR */
.stats-bar{display:flex;gap:12px;padding:20px 32px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap}
.stat-card{background:var(--card);border-radius:10px;padding:14px 20px;flex:1;min-width:140px;box-shadow:var(--shadow);text-align:center}
.stat-card .num{font-size:28px;font-weight:700;font-family:'Playfair Display',serif}
.stat-card .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.stat-card.s-green .num{color:var(--green)}
.stat-card.s-yellow .num{color:var(--yellow)}
.stat-card.s-red .num{color:var(--red)}

/* TAB DETAIL */
.tab-detail{padding:32px;max-width:960px;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.tab-detail h2{font-size:28px;margin-bottom:4px}
.tab-path{font-size:13px;color:var(--text3);margin-bottom:6px;font-family:monospace;background:var(--bg2);display:inline-block;padding:3px 10px;border-radius:6px}
.tab-roles{display:flex;gap:6px;margin:10px 0 20px;flex-wrap:wrap}
.role-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--bg3);color:var(--text2);font-weight:500}

.section-block{background:var(--card);border-radius:var(--radius);padding:24px;margin-bottom:20px;box-shadow:var(--shadow);border:1px solid var(--border)}
.section-block h3{font-size:16px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-block h3 .ico{font-size:18px}

.status-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600}
.status-badge.works{background:#e8f5e9;color:#2e7d32}
.status-badge.partial{background:#fff8e1;color:#f57f17}
.status-badge.stub{background:#fce4ec;color:#c62828}

.action-list{list-style:none;display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px}
.action-list li{padding:10px 14px;background:var(--bg);border-radius:8px;font-size:13px;display:flex;align-items:center;gap:8px;border:1px solid var(--border)}
.action-list li::before{content:'→';color:var(--accent);font-weight:700}

.scenario-card{background:var(--bg);border-radius:10px;padding:16px;margin-bottom:10px;border-left:4px solid var(--accent);font-size:13px}
.scenario-card strong{color:var(--accent);display:block;margin-bottom:6px}
.scenario-card code{background:var(--bg2);padding:2px 6px;border-radius:4px;font-size:12px}

.related-tags{display:flex;gap:6px;flex-wrap:wrap}
.related-tag{font-size:12px;padding:4px 12px;border-radius:20px;background:var(--accent);color:white;cursor:pointer;transition:.15s;font-weight:500}
.related-tag:hover{background:var(--accent2);transform:translateY(-1px)}

.improve-list{list-style:none}
.improve-list li{padding:8px 12px;background:#fff8e1;border-radius:8px;margin-bottom:6px;font-size:13px;border-left:3px solid var(--yellow)}
.improve-list li::before{content:'⚡'}

.diagram{background:#2a1e14;color:#e8ddd0;padding:20px;border-radius:10px;font-family:'Courier New',monospace;font-size:12px;line-height:1.5;overflow-x:auto;white-space:pre}

/* WELCOME */
.welcome{padding:40px 32px;max-width:960px}
.welcome h2{font-size:32px;margin-bottom:8px}
.welcome p{color:var(--text2);font-size:15px;margin-bottom:24px}
.welcome-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.welcome-card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);border:1px solid var(--border);cursor:pointer;transition:.2s}
.welcome-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(61,44,30,.12);border-color:var(--accent3)}
.welcome-card h4{margin-bottom:6px;font-size:15px}
.welcome-card p{font-size:12px;color:var(--text3)}
.welcome-card .cnt{font-size:24px;font-weight:700;color:var(--accent);font-family:'Playfair Display',serif}

.flow-section{margin-top:32px}
.flow-section h3{font-size:20px;margin-bottom:16px}

/* RESPONSIVE */
@media(max-width:768px){
.sidebar{position:fixed;left:-300px;z-index:100;transition:.3s;height:100vh}
.sidebar.open{left:0}
.mobile-toggle{display:block !important}
}
.mobile-toggle{display:none;position:fixed;top:12px;left:12px;z-index:101;background:var(--accent);color:white;border:none;padding:10px 14px;border-radius:8px;font-size:16px;cursor:pointer}
</style>
</head>

const SECTIONS_ORDER=["Главная","Операции","Финансы","Маркетинг","HR","Администрирование","Отчётность","Система","Лояльность","Общее"];

function getStatusInfo(s){return s==="works"?{label:"Работает",cls:"works",color:"green"}:s==="partial"?{label:"Нужна доработка",cls:"partial",color:"yellow"}:{label:"Заглушка",cls:"stub",color:"red"}}

function buildSidebar(){
const nav=document.getElementById("sidebarNav");
let html="";
SECTIONS_ORDER.forEach(sec=>{
const items=TABS.filter(t=>t.section===sec);
if(!items.length)return;
html+=`<div class="nav-section"><div class="nav-section-title">${sec}</div></div>`;
items.forEach(t=>{
const si=getStatusInfo(t.status);
html+=`<div class="nav-item" data-id="${t.id}" data-roles="${t.roles.join(",")}" onclick="showTab('${t.id}')"><span class="icon">${t.icon}</span><span class="label">${t.name}</span><span class="status-dot ${si.color}"></span></div>`;
});
});
nav.innerHTML=html;
}

function filterTabs(){
const q=document.getElementById("search").value.toLowerCase();
const role=document.getElementById("roleFilter").value;
document.querySelectorAll(".nav-item").forEach(el=>{
const id=el.dataset.id;
const tab=TABS.find(t=>t.id===id);
if(!tab){el.classList.add("hidden");return}
const matchQ=!q||tab.name.toLowerCase().includes(q)||tab.desc.toLowerCase().includes(q);
const matchR=role==="all"||tab.roles.includes(role);
el.classList.toggle("hidden",!matchQ||!matchR);
});
updateStats();
}

function updateStats(){
const role=document.getElementById("roleFilter").value;
const visible=role==="all"?TABS:TABS.filter(t=>t.roles.includes(role));
const works=visible.filter(t=>t.status==="works").length;
const partial=visible.filter(t=>t.status==="partial").length;
const stub=visible.filter(t=>t.status==="stub").length;
document.getElementById("statTotal").textContent=visible.length;
document.getElementById("statWorks").textContent=works;
document.getElementById("statPartial").textContent=partial;
document.getElementById("statStub").textContent=stub;
}

function showTab(id){
const tab=TABS.find(t=>t.id===id);
if(!tab)return;
document.querySelectorAll(".nav-item").forEach(el=>el.classList.toggle("active",el.dataset.id===id));
const si=getStatusInfo(tab.status);
let html=`<div class="tab-detail">`;
html+=`<h2>${tab.icon} ${tab.name}</h2>`;
html+=`<div class="tab-path">${tab.path}</div>`;
html+=`<div class="tab-roles">${tab.roles.map(r=>`<span class="role-badge">${r}</span>`).join("")}</div>`;
html+=`<div class="section-block"><h3><span class="ico">ℹ️</span> Описание <span class="status-badge ${si.cls}">${si.label}</span></h3><p>${tab.desc}</p></div>`;
if(tab.actions.length){
html+=`<div class="section-block"><h3><span class="ico">⚡</span> Доступные действия</h3><ul class="action-list">${tab.actions.map(a=>`<li>${a}</li>`).join("")}</ul></div>`;
}
if(tab.scenarios.length){
html+=`<div class="section-block"><h3><span class="ico">🎯</span> Сценарии использования</h3>${tab.scenarios.map(s=>`<div class="scenario-card"><strong>Сценарий:</strong>${s}</div>`).join("")}</div>`;
}
if(tab.diagram){
html+=`<div class="section-block"><h3><span class="ico">📐</span> Схема интерфейса</h3><div class="diagram">${tab.diagram}</div></div>`;
}
if(tab.related.length){
html+=`<div class="section-block"><h3><span class="ico">🔗</span> Связанные разделы</h3><div class="related-tags">${tab.related.map(r=>{const rt=TABS.find(t=>t.id===r);return rt?`<span class="related-tag" onclick="showTab('${r}')">${rt.icon} ${rt.name}</span>`:""}).join("")}</div></div>`;
}
if(tab.improve.length){
html+=`<div class="section-block"><h3><span class="ico">🔨</span> Что доработать</h3><ul class="improve-list">${tab.improve.map(i=>`<li> ${i}</li>`).join("")}</ul></div>`;
}
html+=`</div>`;
document.getElementById("mainContent").innerHTML=html;
document.querySelector(".sidebar").classList.remove("open");
}

function showWelcome(){
const works=TABS.filter(t=>t.status==="works").length;
const partial=TABS.filter(t=>t.status==="partial").length;
const stub=TABS.filter(t=>t.status==="stub").length;
let html=`<div class="stats-bar">
<div class="stat-card"><div class="num">${TABS.length}</div><div class="lbl">Всего вкладок</div></div>
<div class="stat-card s-green"><div class="num" id="statWorks">${works}</div><div class="lbl">Работают</div></div>
<div class="stat-card s-yellow"><div class="num" id="statPartial">${partial}</div><div class="lbl">Доработать</div></div>
<div class="stat-card s-red"><div class="num" id="statStub">${stub}</div><div class="lbl">Заглушки</div></div>
<div class="stat-card"><div class="num" id="statTotal">${TABS.length}</div><div class="lbl">Доступно</div></div>
</div>`;
html+=`<div class="welcome"><h2>☕ Добро пожаловать в гид VendHub OS</h2>
<p>Выберите вкладку в боковом меню или кликните на секцию ниже. Используйте поиск и фильтр по роли.</p>
<div class="welcome-grid">`;
SECTIONS_ORDER.forEach(sec=>{
const items=TABS.filter(t=>t.section===sec);
if(!items.length)return;
const w=items.filter(t=>t.status==="works").length;
html+=`<div class="welcome-card" onclick="showTab('${items[0].id}')"><div class="cnt">${items.length}</div><h4>${sec}</h4><p>${items.map(t=>t.icon).join(" ")} — ${w}/${items.length} работают</p></div>`;
});
html+=`</div>`;
html+=`<div class="flow-section"><h3>📊 Операционная цепочка</h3><div class="diagram">Утро: Менеджер → Дашборд → Алерты + Задачи
  │
  ▼
Создаёт маршрут → Оператор начинает поездку
  │
  ├─► Остановка 1: Заправка (фото до → засыпает → фото после)
  ├─► Остановка 2: Инкассация (считает → записывает сумму)
  ├─► Остановка 3: Ремонт (описание → запчасти → завершение)
  │
  ▼
Завершает поездку → Аналитика
  │
  ▼
Бухгалтер: Принимает инкассацию → Сверяет → Финансы</div></div>`;
html+=`<div class="flow-section"><h3>💰 Финансовая цепочка</h3><div class="diagram">Продажа на машине
  │
  ▼
Транзакция ────► Платёж (Payme / Click / Uzum)
  │                    │
  ▼                    ▼
Инкассация         Фискальный чек (Multikassa)
  │                    │
  ▼                    ▼
Сверка ◄──────── Отчёт платёжной системы
  │
  ▼
Финансы (P&L, Cash Flow, Бюджет) → Отчёты → Инвестор</div></div>`;
html+=`</div>`;
document.getElementById("mainContent").innerHTML=html;
}

buildSidebar();
showWelcome();
</script>
