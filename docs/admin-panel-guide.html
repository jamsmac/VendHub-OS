*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#faf6f1;--bg2:#f3ece3;--bg3:#ebe2d5;--text:#3d2c1e;--text2:#6b5344;--text3:#917a69;--accent:#c0703a;--accent2:#d4944e;--accent3:#e8b87a;--green:#4a9d6e;--yellow:#c49a3c;--red:#c45a4a;--card:#fff;--border:#e0d5c8;--shadow:0 2px 12px rgba(61,44,30,.08);--radius:12px;--sidebar-w:280px}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow:hidden;height:100vh}

.app{display:flex;height:100vh}
.sidebar{width:var(--sidebar-w);background:linear-gradient(180deg,#3d2c1e 0%,#2a1e14 100%);color:#e8ddd0;overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}

.sidebar-header{padding:20px;border-bottom:1px solid rgba(255,255,255,.1);text-align:center}
.sidebar-header h1{font-size:18px;color:#e8b87a;letter-spacing:1px}.sidebar-header p{font-size:11px;color:rgba(255,255,255,.5);margin-top:4px}
.sidebar-controls{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-controls input{width:100%;padding:8px 12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#e8ddd0;font-size:13px;outline:none;transition:.2s}
.sidebar-controls input:focus{border-color:var(--accent)}.sidebar-controls input::placeholder{color:rgba(255,255,255,.35)}
.role-filter{margin-top:8px}
.role-filter select{width:100%;padding:7px 10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#e8ddd0;font-size:12px;outline:none;cursor:pointer}
.role-filter select option{background:#2a1e14;color:#e8ddd0}
.sidebar-nav{flex:1;padding:8px 0}
.nav-section{padding:4px 16px 2px;margin-top:8px}
.nav-section-title{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.35);font-weight:600}
.nav-item{display:flex;align-items:center;padding:8px 16px;cursor:pointer;transition:.15s;font-size:13px;border-left:3px solid transparent;gap:10px}
.nav-item:hover{background:rgba(255,255,255,.06)}.nav-item.active{background:rgba(192,112,58,.2);border-left-color:var(--accent);color:#e8b87a}
.nav-item .icon{width:18px;text-align:center;font-size:14px;opacity:.7}.nav-item .label{flex:1}
.nav-item .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-dot.green{background:var(--green)}.status-dot.yellow{background:var(--yellow)}.status-dot.red{background:var(--red)}
.nav-item.hidden{display:none}
.main{flex:1;overflow-y:auto;padding:0}.main::-webkit-scrollbar{width:8px}.main::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.stats-bar{display:flex;gap:12px;padding:20px 32px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;position:sticky;top:0;z-index:10}
.stat-card{background:var(--card);border-radius:10px;padding:14px 20px;flex:1;min-width:120px;box-shadow:var(--shadow);text-align:center}
.stat-card .num{font-size:26px;font-weight:700;font-family:'Playfair Display',serif}.stat-card .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.stat-card.s-green .num{color:var(--green)}.stat-card.s-yellow .num{color:var(--yellow)}.stat-card.s-red .num{color:var(--red)}
.tab-detail{padding:32px;max-width:1000px;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.tab-detail h2{font-size:28px;margin-bottom:4px}
.tab-path{font-size:13px;color:var(--text3);font-family:monospace;background:var(--bg2);display:inline-block;padding:3px 10px;border-radius:6px}
.tab-roles{display:flex;gap:6px;margin:10px 0 20px;flex-wrap:wrap}
.role-badge{font-size:11px;padding:3px 10px;border-radius:20px;background:var(--bg3);color:var(--text2);font-weight:500}
.section-block{background:var(--card);border-radius:var(--radius);padding:24px;margin-bottom:20px;box-shadow:var(--shadow);border:1px solid var(--border)}
.section-block h3{font-size:16px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.status-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600}
.status-badge.works{background:#e8f5e9;color:#2e7d32}.status-badge.partial{background:#fff8e1;color:#f57f17}.status-badge.stub{background:#fce4ec;color:#c62828}
.action-list{list-style:none;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.action-list li{padding:10px 14px;background:var(--bg);border-radius:8px;font-size:13px;display:flex;align-items:center;gap:8px;border:1px solid var(--border)}

.scenario-card{background:var(--bg);border-radius:10px;padding:16px;margin-bottom:10px;border-left:4px solid var(--accent);font-size:13px}

.related-tags{display:flex;gap:6px;flex-wrap:wrap}

.card-mockup{border:2px solid var(--border);border-radius:12px;overflow:hidden;margin:12px 0;max-width:600px}

.card-mockup-footer{background:var(--bg);padding:8px 16px;display:flex;gap:8px;border-top:1px solid var(--border);flex-wrap:wrap}
.mock-btn{font-size:11px;padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:white;cursor:default;font-weight:500}
.mock-btn.primary{background:var(--accent);color:white;border-color:var(--accent)}
.mock-btn.danger{background:var(--red);color:white;border-color:var(--red)}

/* STAT MOCKUP */
.stat-mockup{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:12px 0}
.stat-mock-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.stat-mock-card .sm-num{font-size:20px;font-weight:700;font-family:'Playfair Display',serif;color:var(--accent)}
.stat-mock-card .sm-lbl{font-size:11px;color:var(--text3)}

.filter-mockup{display:flex;gap:8px;margin:12px 0;flex-wrap:wrap;align-items:center}
.filter-mock{font-size:12px;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:white;color:var(--text2)}

.table-mockup{width:100%;border-collapse:collapse;font-size:12px;margin:12px 0}
.table-mockup th{background:var(--bg2);padding:8px 12px;text-align:left;font-weight:600;color:var(--text2);border-bottom:2px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.table-mockup td{padding:8px 12px;border-bottom:1px solid var(--border)}
.table-mockup tr:hover td{background:var(--bg)}

</head>
