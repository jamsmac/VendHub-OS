// Простой хэш для дедупликации
function hashString(s) {
  let h = 5381;
  for (let i = 0; i < s.length; i++) h = ((h << 5) + h) + s.charCodeAt(i);
  return Math.abs(h).toString(36);
}

function parseDateFlexible(s) {
  if (!s) return null;
  s = String(s).trim();
  // ISO
  const iso = new Date(s);
  if (!isNaN(iso)) return iso.toISOString();
  // ДД.ММ.ГГГГ или ДД.ММ.ГГГГ ЧЧ:ММ
  const m = s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{2,4})(?:[\s,]+(\d{1,2}):(\d{1,2})(?::(\d{1,2}))?)?$/);
  if (m) {
    const yr = m[3].length === 2 ? '20' + m[3] : m[3];
    const dt = new Date(`${yr}-${m[2].padStart(2,'0')}-${m[1].padStart(2,'0')}T${(m[4]||'12').padStart(2,'0')}:${(m[5]||'00').padStart(2,'0')}:${(m[6]||'00').padStart(2,'0')}`);
    if (!isNaN(dt)) return dt.toISOString();
  }
  return null;
}

function executeSalesImport() {
  const d = salesImportData;
  const importId = uid();
  const importedAt = nowISO();
  const reportDateISO = d.reportDate || importedAt;
  const reportDay = reportDateISO.split('T')[0]; // YYYY-MM-DD

  let imported = 0, skipped = 0, unmapped = 0, totalRevenue = 0, totalQty = 0;
  let deltaAdjusted = 0; // сколько строк обработано как delta (дозаписали разницу)
  const balanceWarnings = [];
  const unmappedNames = new Set();
  const deltaLog = []; // для отчёта пользователю

  // Гарантируем наличие хранилищ
  if (!state.salesTxnHashes) state.salesTxnHashes = {};
  if (!state.salesAggregated) state.salesAggregated = {}; // для HICON-агрегированных

  // Проходим по строкам
  d.dataRows.forEach((row, rowIdx) => {
    const rawName = row[d.mapping.productCol] || '';
    const cleanName = cleanProductName(rawName);
    if (!cleanName) { unmapped++; return; }

    const productId = d.productMap[cleanName];
    if (!productId) {
      unmapped++;
      unmappedNames.add(cleanName);
      return;
    }

    // Количество
    const qty = d.mapping.qtyCol >= 0
      ? Math.max(1, Math.round(parseFloat(String(row[d.mapping.qtyCol] || '1').replace(',', '.')) || 1))
      : 1;

    // Цена: приоритет totalAmount / qty, потом priceCol, потом из каталога
    let unitPrice;
    if (d.mapping.totalAmountCol >= 0) {
      const total = parseFloat(String(row[d.mapping.totalAmountCol] || '0').replace(/[^\d,.-]/g, '').replace(',', '.')) || 0;
      unitPrice = qty > 0 ? Math.round(total / qty) : 0;
    } else if (d.mapping.priceCol >= 0) {
      unitPrice = Math.round(parseFloat(String(row[d.mapping.priceCol] || '0').replace(/[^\d,.-]/g, '').replace(',', '.')) || 0);
    } else {
      unitPrice = state.products[productId]?.price || 0;
    }

    // === МНОГОУРОВНЕВАЯ ДЕДУПЛИКАЦИЯ ===

    // Уровень 1: хэш всей сырой строки (если файл тот же и строка не изменилась)
    const rawRowStr = row.map(c => String(c || '').trim()).join('|');
    const rawRowHash = hashString(`row:${reportDay}|${d.machineId}|${rawRowStr}`);

    if (state.salesTxnHashes[rawRowHash]) {
      skipped++;
      return; // точно тот же самый контент строки — уже обрабатывали
    }

    // Уровень 2: уникальный ID транзакции если есть (Click/Payme дают receipt_id)
    const txnRaw = d.mapping.txnIdCol >= 0
      ? String(row[d.mapping.txnIdCol] || '').trim()
      : '';
    // Для HICON txnIdCol = ProductID что НЕ уникальная транзакция, а ID товара
    // Поэтому используем только если это действительно похоже на ID чека (длина > 6 или содержит буквы)
    const isRealTxnId = txnRaw && (txnRaw.length > 6 || /[a-zA-Z\-_]/.test(txnRaw));

    if (isRealTxnId) {
      const txnKey = hashString(`txn:${txnRaw}|${productId}`);
      if (state.salesTxnHashes[txnKey]) {
        skipped++;
        return;
      }
      // запишем оба ключа
      state.salesTxnHashes[txnKey] = importId;
    }

    // Уровень 3: DELTA-логика для агрегированных отчётов (HICON)
    // Ключ: день + машина + продукт. Храним {qty, totalAmount}.
    // Если уже был импорт по этому ключу — считаем РАЗНИЦУ
    const aggKey = `${reportDay}|${d.machineId}|${productId}`;
    const prevAgg = state.salesAggregated[aggKey];
    let effectiveQty = qty;
    let deltaNote = '';

    if (prevAgg && d.format === 'HICON') {
      // Повторный импорт того же дня/машины/товара
      const deltaQty = qty - prevAgg.qty;
      const deltaAmount = (qty * unitPrice) - prevAgg.totalAmount;

      if (deltaQty === 0) {
        // Ничего нового — пропускаем (дублированный отчёт)
        skipped++;
        state.salesTxnHashes[rawRowHash] = importId; // запомним чтобы следующий раз не проверять
        return;
      } else if (deltaQty < 0) {
        // Нонсенс — продаж стало меньше. Логируем warning и пропускаем
        balanceWarnings.push(`${state.products[productId]?.name}: в предыдущем отчёте было ${prevAgg.qty} продаж, в новом только ${qty}. Пропущено.`);
        skipped++;
        return;
      } else {
        // Добавилось deltaQty новых продаж — создаём движение только на разницу
        effectiveQty = deltaQty;
        deltaAdjusted++;
        deltaLog.push(`${state.products[productId]?.name}: +${deltaQty} (было ${prevAgg.qty}, стало ${qty})`);
        deltaNote = ` [+${deltaQty} к ${prevAgg.qty}]`;
      }
    }

    // Проверка остатка
    const bal = getBalance(d.machineId, productId);
    if (bal < effectiveQty) {
      balanceWarnings.push(`${state.products[productId]?.name}: на автомате ${bal}, нужно ${effectiveQty}`);
    }

    addMovement({
      productId,
      fromLocationId: d.machineId,
      quantity: effectiveQty,
      movementType: 'SALE',
      unitCost: state.products[productId]?.cost || 0,
      unitPrice,
      referenceType: 'sales_import',
      referenceId: importId,
      note: `Импорт ${d.fileName}${deltaNote}${isRealTxnId ? ' · ' + txnRaw : ''}`,
      at: reportDateISO,
    });

    // Сохраняем агрегированное состояние по этому дню+товару
    state.salesAggregated[aggKey] = {
      qty,
      totalAmount: qty * unitPrice,
      lastImportId: importId,
      lastUpdate: importedAt,
    };

    // Запоминаем хэш строки чтобы идентичные не обрабатывать дважды
    state.salesTxnHashes[rawRowHash] = importId;

    totalRevenue += effectiveQty * unitPrice;
    totalQty += effectiveQty;
    imported++;
  });

  // Сохраняем запись об импорте
  state.salesImports.unshift({
    id: importId,
    at: importedAt,
    reportDate: reportDateISO,
    fileName: d.fileName,
    format: d.format,
    machineId: d.machineId,
    rowsTotal: d.dataRows.length,
    imported,
    totalQty,
    skipped,
    unmapped,
    deltaAdjusted,
    deltaLog,
    unmappedNames: [...unmappedNames],
    totalRevenue,
    by: (state.settings && state.settings.currentUser) || 'admin',
  });

  saveState();
  closeSheet();
  salesImportData = null;
  haptic('success');

  // Строим красивое сообщение
  let msg = `🎉 Импорт завершён\n`;
  if (imported > 0) msg += `\n✓ ${imported} новых продаж (${totalQty} шт)`;
  if (deltaAdjusted > 0) msg += `\n📊 ${deltaAdjusted} дельта-записей (дозаписали разницу)`;
  if (skipped > 0) msg += `\n⏭ ${skipped} строк уже были (пропущены)`;
  if (unmapped > 0) msg += `\n❓ ${unmapped} без маппинга`;
  msg += `\n💰 Добавлено ${fmt(totalRevenue)} сум`;

  if (deltaLog.length > 0) {
    msg += '\n\n📊 Дельта-обновления:\n' + deltaLog.slice(0, 5).join('\n');
    if (deltaLog.length > 5) msg += `\n...и ещё ${deltaLog.length - 5}`;
  }

  if (balanceWarnings.length > 0) {
    msg += '\n\n⚠ Предупреждения:\n' + balanceWarnings.slice(0, 3).join('\n');
    if (balanceWarnings.length > 3) msg += `\n...и ещё ${balanceWarnings.length - 3}`;
  }

  alert(msg);
  navigate('sales_import');
}

              <div class="basket-row" style="flex-direction:column;align-items:stretch;gap:6px;border-color:${c.border};background:${c.bg};">
                <div style="display:flex;align-items:center;gap:8px;">
                  <div class="dot cat-${x.p.cat}"></div>
                  <div class="main-col">
                    <div style="font-weight:600;font-size:13px;">${escapeHtml(x.p.name)}</div>
                    <div class="mono" style="font-size:10px;color:var(--text-muted);">
                      Ожидается: ${x.expected} · ${escapeHtml(x.p.vol||'')}
                    </div>
                  </div>
                  ${x.diff !== null ? `<div class="mono" style="font-weight:700;font-size:16px;color:${x.diff===0?'var(--emerald)':x.diff>0?'var(--emerald)':'var(--red)'};">${x.diff>0?'+':''}${x.diff}</div>` : ''}
                </div>
                <div class="qty-stepper">
                  <button onclick="adjustReconcile('${x.pid}',-1,${x.expected})">−</button>
                  <input type="number" inputmode="numeric" placeholder="${x.expected}" value="${x.fact===null?'':x.fact}" oninput="setReconcile('${x.pid}',this.value)" />
                  <button onclick="adjustReconcile('${x.pid}',1,${x.expected})">+</button>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      `}
    </div>

    ${enteredCount > 0 ? `
      <div class="card" style="position:sticky;bottom:calc(80px + var(--safe-bottom));">
        <button class="btn btn-primary btn-full" onclick="commitReconcile()">
          ✓ Применить корректировки (${enteredCount - exactCount} расхождений)
        </button>
        <div class="mono" style="font-size:10px;color:var(--text-muted);text-align:center;margin-top:6px;">
          Создаст ADJUSTMENT движения · остатки обновятся
        </div>
      </div>
    ` : ''}
  `;
}

function setReconcileLoc(loc) { reconcileLocation = loc; reconcileFacts = {}; render(); }
function setReconcile(pid, val) { reconcileFacts[pid] = val; render(); }
function adjustReconcile(pid, delta, expected) {
  const cur = reconcileFacts[pid];
  const base = cur === undefined || cur === '' ? expected : Number(cur);
  reconcileFacts[pid] = Math.max(0, base + delta);
  render();
}

function commitReconcile() {
  const locId = reconcileLocation;
  const entries = Object.entries(reconcileFacts).filter(([, v]) => v !== '' && v !== undefined);
  let count = 0;
  let totalShortage = 0, totalSurplus = 0;

  entries.forEach(([pid, factRaw]) => {
    const fact = Number(factRaw);
    const expected = getBalance(locId, pid);
    const diff = fact - expected;
    if (diff === 0) return;

    const p = state.products[pid];
    if (diff > 0) {
      addMovement({
        productId: pid,
        toLocationId: locId,
        quantity: diff,
        movementType: 'ADJUSTMENT_PLUS',
        unitCost: p?.cost || 0,
        note: `Сверка ${formatDateTime(nowISO())}: фактически +${diff}`,
      });
      totalSurplus += diff * (p?.cost || 0);
    } else {
      addMovement({
        productId: pid,
        fromLocationId: locId,
        quantity: -diff,
        movementType: 'ADJUSTMENT_MINUS',
        unitCost: p?.cost || 0,
        note: `Сверка ${formatDateTime(nowISO())}: фактически ${diff}`,
      });
      totalShortage += -diff * (p?.cost || 0);
    }
    count++;
  });

  if (count === 0) {
    toast('Нет расхождений для применения');
    return;
  }

  reconcileFacts = {};
  haptic('success');
  let msg = `🎉 Сверка завершена\n\n${count} корректировок применено`;
  if (totalShortage > 0) msg += `\n\n⚠ Недостача: −${fmt(totalShortage)} сум`;
  if (totalSurplus > 0) msg += `\n✓ Излишек: +${fmt(totalSurplus)} сум`;
  alert(msg);
  navigate('dashboard');
}

            <div class="name">Экспорт всех данных</div>
            <div class="meta">JSON-бэкап</div>
          </div>
        </div>
        <div class="list-item" onclick="document.getElementById('import_input').click()">
          <div style="color:var(--blue);">${ICONS.list}</div>
          <div class="main-col">
            <div class="name">Импорт данных</div>
            <div class="meta">Заменит текущие</div>
          </div>
        </div>
        <input id="import_input" type="file" accept=".json" style="display:none;" onchange="importData(this.files[0])" />
      </div>
    </div>

    <div class="card">
      <div class="card-head"><div class="card-title">Статистика</div></div>
      <table class="table-compact">
        <tr><td>Товаров</td><td class="right mono">${Object.keys(state.products).length}</td></tr>
        <tr><td>Движений</td><td class="right mono">${state.movements.length}</td></tr>
        <tr><td>Закупок</td><td class="right mono">${state.purchases.length}</td></tr>
        <tr><td>Изменений цен</td><td class="right mono">${state.priceHistory.length}</td></tr>
        <tr><td>Размер данных</td><td class="right mono">${fmt((JSON.stringify(state).length/1024))} кб</td></tr>
      </table>
    </div>

    <button class="btn btn-danger btn-full" onclick="resetAll()">Сбросить все данные</button>
  `;
}

function exportAll() {
  const data = JSON.stringify(state, null, 2);
  downloadFile(`olma_backup_${today()}.json`, data, 'application/json');
  toast('Бэкап сохранён');
}

function importData(file) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!confirmDialog('Заменить все текущие данные импортированными?')) return;
      state = imported;
      saveState();
      toast('Импорт выполнен');
      navigate('dashboard');
    } catch (err) { toast('Ошибка: ' + err.message, true); }
  };
  reader.readAsText(file);
}

function resetAll() {
  if (!confirmDialog('СБРОСИТЬ ВСЁ к дефолтам? Это необратимо.')) return;
  if (!confirmDialog('Точно? История закупок и движений будет удалена.')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = loadState();
  saveState();
  toast('Сброшено');
  navigate('dashboard');
}

// ============================================================
// SHEETS / MODAL
// ============================================================

function openSheet({ title, content }) {
  const wrap = document.createElement('div');
  wrap.className = 'sheet-overlay';
  wrap.onclick = (e) => { if (e.target === wrap) closeSheet(); };
  wrap.innerHTML = `
    <div class="sheet">
      <div class="sheet-handle"></div>
      <button class="sheet-close" onclick="closeSheet()">✕</button>
      <div class="sheet-title">${title}</div>
      <div>${content}</div>
    </div>
  `;
  document.getElementById('modals').appendChild(wrap);
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  const wrap = document.querySelector('.sheet-overlay');
  if (wrap) wrap.remove();
  document.body.style.overflow = '';
}

// ============================================================
// HELPERS
// ============================================================

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function formatDateTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' }) + ' ' +
         d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function formatDuration(ms) {
  if (!ms || ms < 0) return '—';
  const sec = Math.floor(ms / 1000);
  if (sec < 60) return `${sec} сек`;
  const min = Math.floor(sec / 60);
  if (min < 60) return `${min} мин ${sec % 60} сек`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr} ч ${min % 60} мин`;
  const d = Math.floor(hr / 24);
  if (d < 30) return `${d} дн ${hr % 24} ч`;
  const mo = Math.floor(d / 30);
  return `${mo} мес ${d % 30} дн`;
}

function downloadFile(name, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = name; a.click();
  URL.revokeObjectURL(url);
}
