<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="OLMA" />
<meta name="theme-color" content="#0a0e13" />
<title>OLMA Inventory · VendHub</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230a0e13'/%3E%3Ctext x='90' y='118' text-anchor='middle' font-family='system-ui' font-size='80' font-weight='800' fill='%23f59e0b'%3EO%3C/text%3E%3C/svg%3E" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet" />

<style>
:root {
  --bg: #0a0e13;
  --bg-elev: #12171f;
  --bg-elev-2: #1a212c;
  --border: #1f2937;
  --border-soft: #374151;
  --text: #e5e7eb;
  --text-dim: #9ca3af;
  --text-muted: #6b7280;
  --accent: #f59e0b;
  --accent-soft: #f59e0b22;
  --accent-glow: #f59e0b40;
  --accent-deep: #b45309;
  --accent-grad: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
  --emerald: #10b981;
  --emerald-soft: #10b98122;
  --red: #ef4444;
  --red-soft: #ef444422;
  --blue: #3b82f6;
  --blue-soft: #3b82f622;
  --purple: #a855f7;
  --purple-soft: #a855f722;
  --sky: #0ea5e9;
  --lime: #84cc16;
  --safe-top: env(safe-area-inset-top);
  --safe-bottom: env(safe-area-inset-bottom);
  --shadow-soft: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24);
  --shadow-elev: 0 10px 30px rgba(0,0,0,0.4), 0 1px 8px rgba(0,0,0,0.2);
  --shadow-glow: 0 0 24px var(--accent-glow);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: 'Manrope', -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.4;
  overscroll-behavior-y: contain;
  -webkit-font-smoothing: antialiased;
}
body { min-height: 100vh; min-height: 100dvh; }
.mono { font-family: 'IBM Plex Mono', monospace; }
.display { font-family: 'Instrument Serif', serif; font-weight: 400; letter-spacing: -0.01em; }

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea {
  font-family: inherit; font-size: 16px; /* 16 чтобы iOS не зумил */
  background: var(--bg-elev-2); color: var(--text);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 12px; width: 100%;
  -webkit-appearance: none; appearance: none;
}
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
input[type=number] { -moz-appearance: textfield; }
input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

/* LAYOUT */
.app { min-height: 100dvh; display: flex; flex-direction: column; padding-bottom: calc(72px + var(--safe-bottom)); }
.topbar {
  position: sticky; top: 0; z-index: 30;
  padding: calc(10px + var(--safe-top)) 16px 10px;
  background: rgba(10,14,19,0.78);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.topbar-inner { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.topbar h1 { font-size: 18px; font-weight: 700; margin: 0; letter-spacing: -0.02em; }
.topbar .sub { font-size: 11px; color: var(--text-muted); font-family: 'IBM Plex Mono'; letter-spacing: 0.08em; text-transform: uppercase; }

.main { flex: 1; padding: 16px; }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
  padding-bottom: var(--safe-bottom);
  background: rgba(10,14,19,0.85);
  backdrop-filter: blur(28px) saturate(180%);
  -webkit-backdrop-filter: blur(28px) saturate(180%);
  border-top: 1px solid rgba(255,255,255,0.06);
}
.bottom-nav-inner { display: grid; grid-template-columns: repeat(5, 1fr); }
.tab-btn {
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 10px 2px 8px; font-size: 10px; color: var(--text-muted);
  transition: color .2s cubic-bezier(0.16, 1, 0.3, 1);
  position: relative;
}
.tab-btn svg { width: 22px; height: 22px; stroke-width: 1.6; transition: transform .25s cubic-bezier(0.16, 1, 0.3, 1); }
.tab-btn:active svg { transform: scale(0.85); }
.tab-btn.active { color: var(--accent); }
.tab-btn.active svg {
  filter: drop-shadow(0 0 8px var(--accent-glow));
  animation: tabPop .35s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes tabPop {
  0% { transform: scale(1); }
  40% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
.tab-btn.active .tab-dot { opacity: 1; transform: scale(1); }
.tab-dot {
  width: 4px; height: 4px; background: var(--accent); border-radius: 50%;
  opacity: 0; transition: all .25s cubic-bezier(0.16, 1, 0.3, 1);
  transform: scale(0);
  box-shadow: 0 0 6px var(--accent-glow);
}

/* CARDS */
.card {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 12px;
  transition: border-color .2s;
}
.card:hover { border-color: var(--border-soft); }
.card-head {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 10px; gap: 10px;
}
.card-title { font-weight: 700; font-size: 15px; letter-spacing: -0.01em; }

/* METRICS */
.metrics { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px; }
.metric {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px;
  position: relative;
  overflow: hidden;
  transition: transform .2s cubic-bezier(0.16, 1, 0.3, 1), border-color .2s;
}
.metric:active { transform: scale(0.98); }
.metric::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent-soft), transparent);
  opacity: 0;
  transition: opacity .3s;
}
.metric:hover::before { opacity: 1; }
.metric .label { font-family: 'IBM Plex Mono'; font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 6px; }
.metric .val { font-family: 'IBM Plex Mono'; font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
.metric .val.accent { color: var(--accent); }
.metric .val.emerald { color: var(--emerald); }
.metric .val.blue { color: var(--blue); }
.metric .val.red { color: var(--red); }
.metric .unit { font-family: 'IBM Plex Mono'; font-size: 11px; color: var(--text-muted); margin-left: 4px; font-weight: 400; }

/* LISTS */
.list { display: flex; flex-direction: column; gap: 8px; }
.list-item {
  background: var(--bg-elev); border: 1px solid var(--border); border-radius: 12px;
  padding: 12px; display: flex; align-items: center; gap: 12px;
  transition: all .15s;
}
.list-item:active { transform: scale(0.98); background: var(--bg-elev-2); }
.list-item .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.list-item .main-col { flex: 1; min-width: 0; }
.list-item .name { font-weight: 600; font-size: 14px; }
.list-item .meta { font-family: 'IBM Plex Mono'; font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.list-item .price { font-family: 'IBM Plex Mono'; font-weight: 600; font-size: 14px; color: var(--accent); white-space: nowrap; }

/* CATEGORY COLORS */
.cat-cola { background: #ef4444; }
.cat-energy { background: #f59e0b; }
.cat-mojito { background: #10b981; }
.cat-fresh { background: #84cc16; }
.cat-tea { background: #fb923c; }
.cat-water { background: #0ea5e9; }
.cat-bar { background: #a855f7; }
.cat-chips { background: #eab308; }
.cat-other { background: #6b7280; }

/* BUTTONS */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 12px 16px; border-radius: 12px; font-weight: 600; font-size: 14px;
  transition: all .15s cubic-bezier(0.16, 1, 0.3, 1); text-align: center;
  letter-spacing: -0.01em;
}
.btn:active { transform: scale(0.96); }
.btn-primary {
  background: var(--accent-grad);
  color: #0a0e13;
  box-shadow: 0 4px 14px var(--accent-glow);
}
.btn-primary:active { box-shadow: 0 2px 8px var(--accent-glow); }
.btn-ghost {
  background: var(--bg-elev-2);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-ghost:active { background: var(--bg-elev); border-color: var(--border-soft); }
.btn-danger { background: transparent; color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
.btn-danger:active { background: var(--red-soft); }
.btn-full { width: 100%; }
.btn-fab {
  position: fixed; bottom: calc(84px + var(--safe-bottom)); right: 16px;
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--accent-grad); color: #0a0e13;
  font-size: 28px; font-weight: 400;
  box-shadow: 0 12px 32px var(--accent-glow), 0 4px 12px rgba(245,158,11,0.2);
  z-index: 20; display: flex; align-items: center; justify-content: center;
  transition: transform .15s, box-shadow .15s;
}
.btn-fab:active { transform: scale(0.92); box-shadow: 0 6px 16px var(--accent-glow); }

.btn-group { display: flex; gap: 8px; }
.btn-group > .btn { flex: 1; }

/* FILTERS / CHIPS */
.chips { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 12px; scrollbar-width: none; }
.chips::-webkit-scrollbar { display: none; }
.chip {
  padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
  background: var(--bg-elev); border: 1px solid var(--border);
  color: var(--text-dim); white-space: nowrap; flex-shrink: 0;
}
.chip.active { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }

/* SEARCH */
.search-wrap { position: relative; margin-bottom: 12px; }
.search-wrap input { padding-left: 38px; }
.search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 18px; height: 18px; }

/* MODAL / SHEET */
.sheet-overlay {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(0,0,0,0.6);
  display: flex; align-items: flex-end;
  animation: fadeIn .2s;
}
.sheet {
  background: var(--bg-elev);
  width: 100%; max-height: 92dvh;
  border-radius: 20px 20px 0 0;
  padding: 12px 16px calc(16px + var(--safe-bottom));
  overflow-y: auto;
  animation: slideUp .25s cubic-bezier(0.16, 1, 0.3, 1);
  -webkit-overflow-scrolling: touch;
}
.sheet-handle { width: 40px; height: 4px; background: var(--border-soft); border-radius: 2px; margin: 0 auto 14px; }
.sheet-title { font-weight: 700; font-size: 18px; margin-bottom: 12px; }
.sheet-close { position: absolute; top: 16px; right: 16px; width: 32px; height: 32px; border-radius: 50%; background: var(--bg-elev-2); display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--text-dim); }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

/* FORMS */
.field { margin-bottom: 12px; }
.field label { display: block; font-family: 'IBM Plex Mono'; font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); margin-bottom: 6px; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }

/* SLOT GRID (визуальная раскладка аппарата) */
.machine-grid { background: linear-gradient(180deg, #12171f, #0a0e13); border: 1px solid var(--border); border-radius: 14px; padding: 10px; overflow-x: auto; }
.machine-row { display: flex; gap: 5px; margin-bottom: 5px; align-items: center; }
.row-label { width: 24px; font-family: 'IBM Plex Mono'; font-size: 9px; color: var(--text-muted); text-align: right; }
.slot-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; flex: 1; min-width: 0; }
.slot {
  aspect-ratio: 1;
  background: var(--bg-elev-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 3px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  font-size: 9px; text-align: center; line-height: 1.1;
  position: relative; overflow: hidden;
  min-height: 44px;
}
.slot:active { transform: scale(0.95); }
.slot.empty { border-style: dashed; color: var(--text-muted); font-size: 18px; }
.slot .slot-dot { width: 5px; height: 5px; border-radius: 50%; position: absolute; top: 3px; right: 3px; }
.slot .slot-name { font-weight: 600; font-size: 9px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.slot .slot-vol { font-family: 'IBM Plex Mono'; font-size: 8px; color: var(--text-muted); margin-top: 1px; }

/* MOVEMENT TYPES COLORS */
.mv-in { color: var(--emerald); }
.mv-out { color: var(--red); }
.mv-transfer { color: var(--blue); }

/* BADGE */
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-family: 'IBM Plex Mono'; font-size: 10px; font-weight: 500; }
.badge-new { background: rgba(245,158,11,0.15); color: var(--accent); }
.badge-low { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-ok { background: rgba(16,185,129,0.15); color: var(--emerald); }

/* EMPTY */
.empty { text-align: center; padding: 48px 20px; color: var(--text-muted); }
.empty .big { font-family: 'Instrument Serif', serif; font-size: 32px; color: var(--text-dim); margin-bottom: 8px; }

/* TOAST */
.toast {
  position: fixed; left: 16px; right: 16px; bottom: calc(90px + var(--safe-bottom));
  background: var(--emerald); color: white;
  padding: 12px 16px; border-radius: 12px; text-align: center;
  font-weight: 600; font-size: 14px; z-index: 60;
  animation: toastIn .25s cubic-bezier(0.16, 1, 0.3, 1);
}
.toast.error { background: var(--red); }
@keyframes toastIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* SCREEN HEADER */
.screen-h { margin-bottom: 14px; }
.screen-h h2 { font-family: 'Instrument Serif', serif; font-size: 28px; font-weight: 400; margin: 0 0 2px; letter-spacing: -0.01em; }
.screen-h p { color: var(--text-muted); font-size: 13px; margin: 0; }

.divider { border-top: 1px solid var(--border); margin: 14px 0; }

/* TABLE (компактная для мобилы) */
.table-compact { width: 100%; font-size: 12px; border-collapse: collapse; }
.table-compact th { text-align: left; font-family: 'IBM Plex Mono'; font-size: 9px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); padding: 8px 6px; border-bottom: 1px solid var(--border); }
.table-compact td { padding: 10px 6px; border-bottom: 1px solid var(--border); }
.table-compact .right { text-align: right; }
.table-compact tr:last-child td { border-bottom: none; }

/* PULSE / SCAN BUTTON */
.scan-btn {
  padding: 18px; border-radius: 16px; background: var(--bg-elev);
  border: 2px dashed var(--border-soft); width: 100%;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  color: var(--text-dim);
}
.scan-btn svg { width: 36px; height: 36px; color: var(--accent); }

/* PROGRESS */
.progress { height: 6px; background: var(--bg-elev-2); border-radius: 3px; overflow: hidden; }
.progress-bar { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; }

.fade-in { animation: fadeIn .25s; }

/* WIZARD STYLES */
.wizard-steps { display: flex; gap: 4px; margin-bottom: 16px; padding: 0 4px; }
.wizard-step { flex: 1; height: 4px; background: var(--border); border-radius: 2px; transition: background .3s; }
.wizard-step.done { background: var(--accent); }
.wizard-step.active { background: var(--accent); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

.hero-card {
  background: linear-gradient(135deg, var(--bg-elev) 0%, var(--bg-elev-2) 100%);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 20px;
  margin-bottom: 14px;
  position: relative;
  overflow: hidden;
}
.hero-card::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 120px; height: 120px;
  background: radial-gradient(circle, var(--accent-soft) 0%, transparent 70%);
  pointer-events: none;
}
.hero-step { font-family: 'IBM Plex Mono'; font-size: 10px; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px; }
.hero-title { font-family: 'Instrument Serif'; font-size: 28px; line-height: 1.1; margin-bottom: 4px; }
.hero-sub { font-size: 13px; color: var(--text-muted); }

.tile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.tile {
  background: var(--bg-elev);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  text-align: left;
  transition: all .2s cubic-bezier(0.16, 1, 0.3, 1);
  display: flex; flex-direction: column; gap: 6px;
  min-height: 88px;
}
.tile:active { transform: scale(0.97); }
.tile.selected { border-color: var(--accent); background: var(--accent-soft); }
.tile-icon { font-size: 22px; line-height: 1; }
.tile-title { font-weight: 700; font-size: 14px; }
.tile-meta { font-family: 'IBM Plex Mono'; font-size: 10px; color: var(--text-muted); }

.big-btn {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
  padding: 16px 18px;
  background: var(--bg-elev);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  width: 100%;
  text-align: left;
  transition: all .15s;
  margin-bottom: 8px;
}
.big-btn:active { transform: scale(0.98); background: var(--bg-elev-2); }
.big-btn-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: var(--accent-soft);
  color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 22px;
}
.big-btn-content { flex: 1; min-width: 0; }
.big-btn-title { font-weight: 700; font-size: 15px; }
.big-btn-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.big-btn-arrow { color: var(--text-muted); flex-shrink: 0; }

.cart-fly {
  position: fixed; bottom: calc(80px + var(--safe-bottom)); left: 16px; right: 16px;
  background: linear-gradient(135deg, var(--accent), var(--accent-deep));
  color: #0a0e13;
  padding: 14px 16px;
  border-radius: 14px;
  font-weight: 700;
  display: flex; justify-content: space-between; align-items: center;
  box-shadow: 0 8px 24px rgba(245,158,11,0.35);
  z-index: 25;
  animation: slideUpBounce .4s cubic-bezier(0.16, 1, 0.3, 1);
}
@keyframes slideUpBounce { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.qty-stepper {
  display: flex; align-items: stretch;
  background: var(--bg-elev-2); border-radius: 12px;
  border: 1px solid var(--border);
  overflow: hidden;
}
.qty-stepper button {
  width: 44px; font-size: 22px; color: var(--accent);
  display: flex; align-items: center; justify-content: center;
}
.qty-stepper button:active { background: var(--accent-soft); }
.qty-stepper input {
  flex: 1; text-align: center; font-weight: 700; font-size: 18px;
  background: transparent; border: none; border-radius: 0; padding: 8px;
}

.price-mode-tabs {
  display: flex; background: var(--bg-elev-2); border-radius: 12px; padding: 3px; margin-bottom: 10px;
}
.price-mode-tabs button {
  flex: 1; padding: 8px; font-size: 12px; font-weight: 600;
  border-radius: 9px; color: var(--text-dim);
}
.price-mode-tabs button.active { background: var(--accent); color: #0a0e13; }

.live-calc {
  font-family: 'IBM Plex Mono';
  font-size: 14px;
  color: var(--accent);
  text-align: center;
  padding: 10px;
  background: var(--accent-soft);
  border-radius: 10px;
  margin-top: 10px;
}

.basket-row {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 12px;
  margin-bottom: 6px;
  display: flex; align-items: center; gap: 10px;
}

const fmt = n => new Intl.NumberFormat('ru-RU').format(Math.round(Number(n) || 0));
const fmtK = n => {
  n = Number(n) || 0;
  if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(2) + ' млн';
  if (Math.abs(n) >= 1e3) return Math.round(n / 1e3) + ' тыс';
  return fmt(n);
};
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const today = () => new Date().toISOString().split('T')[0];
const nowISO = () => new Date().toISOString();

let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      // Миграция: гарантируем что все поля существуют (для старых сохранений)
      return {
        ...DEFAULT_STATE,
        ...saved,
        products: { ...DEFAULT_STATE.products, ...(saved.products || {}) },
        locations: { ...DEFAULT_STATE.locations, ...(saved.locations || {}) },
        suppliers: { ...DEFAULT_STATE.suppliers, ...(saved.suppliers || {}) },
        movements: saved.movements || [],
        purchases: saved.purchases || [],
        priceHistory: saved.priceHistory || [],
        slotHistory: saved.slotHistory || [],
        salesImports: saved.salesImports || [],
        salesTxnHashes: saved.salesTxnHashes || {},
        salesAggregated: saved.salesAggregated || {},
        balances: saved.balances || {},
        settings: { ...DEFAULT_STATE.settings, ...(saved.settings || {}) },
      };
    }
  } catch (e) { console.error('Load error:', e); }
  // Первый запуск: seed баланса
  const s = JSON.parse(JSON.stringify(DEFAULT_STATE));
  // Начальные остатки: всё стоит на машинах в размере половины ёмкости
  ['drinkLayout', 'snackLayout'].forEach(layoutKey => {
    const layout = s[layoutKey];
    const locId = layoutKey === 'drinkLayout' ? 'm_icedrink' : 'm_snack';
    layout.forEach(row => row.forEach(pid => {
      if (pid && s.products[pid]) {
        const cap = s.products[pid].cap || 8;
        const key = locId + ':' + pid;
        s.balances[key] = (s.balances[key] || 0) + Math.floor(cap / 2);
      }
    }));
  });
  // Seed начальной истории раскладок — одна запись на каждый занятый слот
  const initDate = new Date('2026-04-01T09:00:00').toISOString();
  ['drinkLayout', 'snackLayout'].forEach(layoutKey => {
    const machineCode = layoutKey === 'drinkLayout' ? 'ICE' : 'SNACK';
    s[layoutKey].forEach((row, ri) => row.forEach((pid, ci) => {
      if (pid) {
        s.slotHistory.push({
          id: uid(),
          at: initDate,
          slotKey: `${machineCode}:${ri+1}.${ci+1}`,
          machine: machineCode,
          row: ri + 1, col: ci + 1,
          action: 'SET',
          prevProductId: null,
          productId: pid,
          by: 'Jamshid',
          fromScreen: 'Начальная раскладка',
          note: 'Импорт из Excel (Напитковые_данные.xlsx)',
        });
      }
    }));
  });
  // Сортируем по дате (новые сверху)
  s.slotHistory.sort((a, b) => new Date(b.at) - new Date(a.at));
  return s;
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch (e) { toast('Ошибка сохранения: ' + e.message, true); }
}

function getBalance(locId, productId) {
  return state.balances[locId + ':' + productId] || 0;
}

function addMovement(m) {
  const full = {
    id: uid(),
    at: nowISO(),
    by: (state.settings && state.settings.currentUser) || 'admin',
    ...m,
  };
  state.movements.unshift(full);

  // Обновление остатков
  if (m.fromLocationId) {
    const key = m.fromLocationId + ':' + m.productId;
    state.balances[key] = (state.balances[key] || 0) - m.quantity;
  }
  if (m.toLocationId) {
    const key = m.toLocationId + ':' + m.productId;
    state.balances[key] = (state.balances[key] || 0) + m.quantity;
  }
  saveState();
  return full;
}

function updatePrice(productId, priceType, newPrice, reason) {
  const p = state.products[productId];
  if (!p) return;
  const field = priceType === 'COST' ? 'cost' : 'price';
  const oldPrice = p[field];
  if (oldPrice === newPrice) return;
  state.priceHistory.unshift({
    id: uid(),
    productId,
    priceType,
    oldPrice,
    newPrice,
    at: nowISO(),
    reason: reason || '',
  });
  p[field] = newPrice;
  saveState();
}

function toast(msg, isError) {
  // Haptic feedback на iOS/Android
  if (navigator.vibrate) navigator.vibrate(isError ? [10, 40, 10] : 8);
  const el = document.createElement('div');
  el.className = 'toast' + (isError ? ' error' : '');
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

function haptic(intensity) {
  if (!navigator.vibrate) return;
  if (intensity === 'light') navigator.vibrate(5);
  else if (intensity === 'medium') navigator.vibrate(15);
  else if (intensity === 'heavy') navigator.vibrate(25);
  else if (intensity === 'success') navigator.vibrate([10, 40, 20]);
}

function confirmDialog(msg) {

const PRIMARY_TABS = ['dashboard', 'catalog', 'layout', 'inventory', 'more'];

let currentRoute = 'dashboard';
let routeParams = {};

function navigate(route, params = {}) {
  if (!ROUTES[route]) return;
  currentRoute = route;
  routeParams = params;
  render();
  window.scrollTo(0, 0);
}

function render() {
  const r = ROUTES[currentRoute];
  const app = document.getElementById('app');
  const isPrimary = PRIMARY_TABS.includes(currentRoute);
  app.innerHTML = `
    <header class="topbar">
      <div class="topbar-inner">
        ${r.back ? `<button class="btn btn-ghost" style="padding:6px 10px;" onclick="navigate('${r.back}')">← Назад</button>` : `<div><div class="sub">VendHub · OLMA</div><h1>${r.title}</h1></div>`}
        ${r.back ? `<div style="flex:1;text-align:center;font-weight:700;">${r.title}</div>` : ''}
        ${!r.back && currentRoute === 'dashboard' ? `<button class="btn btn-ghost" style="padding:8px;" onclick="navigate('settings')">${ICONS.more}</button>` : '<div style="width:40px;"></div>'}
      </div>
    </header>
    <main class="main fade-in" id="main-content"></main>
    ${isPrimary ? renderBottomNav() : ''}
  `;
  r.render(document.getElementById('main-content'));
}

function renderBottomNav() {
  return `
    <nav class="bottom-nav">
      <div class="bottom-nav-inner">
        ${PRIMARY_TABS.map(k => `
          <button class="tab-btn ${currentRoute === k ? 'active' : ''}" onclick="navWithHaptic('${k}')">
            ${ICONS[ROUTES[k].icon]}
            <span>${tabLabel(k)}</span>
            <div class="tab-dot"></div>
          </button>
        `).join('')}
      </div>
    </nav>
  `;
}

function tabLabel(k) {
  return { dashboard: 'Главная', catalog: 'Товары', layout: 'Раскладка', inventory: 'Остатки', more: 'Ещё' }[k];
}

function navWithHaptic(route) {
  haptic('light');
  navigate(route);
}

// Получить актуальную закупочную цену из последних движений PURCHASE_IN
function getCurrentCost(productId) {
  // Берём last cost from movements или из priceHistory (тип COST)
  const lastPurchase = state.movements.find(m => m.productId === productId && m.movementType === 'PURCHASE_IN' && m.unitCost > 0);
  if (lastPurchase) return lastPurchase.unitCost;
  const lastCostHist = (state.priceHistory || []).find(h => h.productId === productId && h.priceType === 'COST');
  if (lastCostHist) return lastCostHist.newPrice;
  // Fallback на старое поле (для миграции)
  return state.products[productId]?.cost || 0;
}

// Sparkline продаж за N дней
function buildSalesSparkline(productId, days) {
  const result = [];
  const now = Date.now();
  for (let i = days - 1; i >= 0; i--) {
    const dayStart = new Date(now - i * 86400000);
    dayStart.setHours(0,0,0,0);
    const dayEnd = new Date(dayStart.getTime() + 86400000);
    let qty = 0, revenue = 0;
    state.movements.forEach(m => {
      if (m.productId !== productId || m.movementType !== 'SALE') return;
      const t = new Date(m.at);
      if (t >= dayStart && t < dayEnd) {
        qty += m.quantity;
        revenue += m.quantity * (m.unitPrice || 0);
      }
    });
    result.push({ date: dayStart, qty, revenue });
  }
  return result;
}

function renderSparkline(data, w, h) {
  if (!data || data.length === 0) return '';
  const max = Math.max(1, ...data.map(d => d.qty));
  const stepX = w / Math.max(1, data.length - 1);
  const points = data.map((d, i) => {
    const x = i * stepX;
    const y = h - (d.qty / max) * h;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const area = `M0,${h} L${points.join(' L')} L${w},${h} Z`;
  const line = `M${points.join(' L')}`;
  return `
    <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" style="width:100%;height:${h}px;display:block;">
      <defs>
        <linearGradient id="spark-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
        </linearGradient>
      </defs>
      <path d="${area}" fill="url(#spark-grad)"/>
      <path d="${line}" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linejoin="round"/>

    </svg>
  `;
}

// Умный калькулятор: пересчитывает 2 поля при изменении 1
function recalcPrice(changed, cost) {
  const pctEl = document.getElementById('f_pct');
  const markupEl = document.getElementById('f_markup');
  const priceEl = document.getElementById('f_price');
  const preview = document.getElementById('f_calc_preview');
  if (!pctEl || !markupEl || !priceEl) return;

  const pct = Number(pctEl.value);
  const markup = Number(markupEl.value);
  const price = Number(priceEl.value);
  cost = Number(cost) || 0;

  // Без закупочной цены: только финальная имеет смысл
  if (cost <= 0) {
    if (price > 0) {
      preview.innerHTML = `<span style="color:var(--accent);">Цена: <strong>${fmt(price)}</strong> сум</span> · наценку посчитаем после первой закупки`;
    } else {
      preview.textContent = 'Введи финальную цену';
    }
    return;
  }

  // Есть себестоимость — все 3 поля связаны
  if (changed === 'pct' && pctEl.value !== '') {
    const newMarkup = Math.round(cost * pct / 100);
    const newPrice = cost + newMarkup;
    markupEl.value = newMarkup;
    priceEl.value = newPrice;
  } else if (changed === 'markup' && markupEl.value !== '') {
    const newPrice = cost + markup;
    const newPct = (markup / cost * 100).toFixed(1);
    priceEl.value = newPrice;
    pctEl.value = newPct;
  } else if (changed === 'price' && priceEl.value !== '') {
    const newMarkup = price - cost;
    const newPct = cost > 0 ? (newMarkup / cost * 100).toFixed(1) : 0;
    markupEl.value = newMarkup;
    pctEl.value = newPct;
  } else if (changed === 'init') {
    // При открытии — посчитать всё что можем из текущей цены
    if (price > 0 && cost > 0) {
      const newMarkup = price - cost;
      const newPct = (newMarkup / cost * 100).toFixed(1);
      markupEl.value = newMarkup;
      pctEl.value = newPct;
    }
  }

  // Превью
  const finalPrice = Number(priceEl.value);
  const finalMarkup = Number(markupEl.value);
  const finalPct = Number(pctEl.value);
  if (finalPrice > 0) {
    const profit = finalPrice - cost;
    const sign = profit >= 0 ? '+' : '';
    const color = profit > 0 ? 'var(--emerald)' : profit < 0 ? 'var(--red)' : 'var(--text-muted)';
    preview.innerHTML = `${fmt(cost)} закуп → <strong style="color:var(--accent);">${fmt(finalPrice)}</strong> · прибыль <span style="color:${color};">${sign}${fmt(profit)} сум (${sign}${finalPct}%)</span>`;
  } else {
    preview.textContent = 'Введи любое из трёх — остальные посчитаются';
  }
}

function saveProduct(editId) {
  const data = {
    name: document.getElementById('f_name').value.trim(),
    vol: document.getElementById('f_vol').value.trim(),
    barcode: document.getElementById('f_barcode').value.trim(),
    grp: document.getElementById('f_grp').value,
    cat: document.getElementById('f_cat').value,
    price: Number(document.getElementById('f_price').value) || 0,
    spd: Number(document.getElementById('f_spd').value) || 0,
    cap: Number(document.getElementById('f_cap').value) || 1,
    sup: document.getElementById('f_sup').value.trim(),
  };
  if (!data.name) { toast('Укажи название', true); return; }

  if (editId) {
    const old = state.products[editId];
    // НЕ обновляем cost вручную — он живёт через закупки
    // Пишем только историю цены продажи
    if ((old.price || 0) !== data.price && data.price > 0) {
      state.priceHistory.unshift({
        id: uid(), productId: editId, priceType: 'SELLING',
        oldPrice: old.price || 0, newPrice: data.price,
        at: nowISO(), reason: 'Изменение в карточке',
        by: (state.settings && state.settings.currentUser) || 'admin',
      });
    }
    state.products[editId] = { ...old, ...data, cost: old.cost || 0 }; // cost не трогаем
  } else {
    const newId = 'p_' + uid();
    // Новый товар — cost=0, обновится при первой закупке
    state.products[newId] = { ...data, cost: 0, isNew: true };
    // Запись в историю цены продажи как initial
    if (data.price > 0) {
      state.priceHistory.unshift({
        id: uid(), productId: newId, priceType: 'SELLING',
        oldPrice: 0, newPrice: data.price,
        at: nowISO(), reason: 'Создание товара',
        by: (state.settings && state.settings.currentUser) || 'admin',
      });
    }
  }
  saveState();
  closeSheet();
  toast(editId ? 'Сохранено' : 'Товар создан');
  render();
}

function deleteProduct(id) {
  if (!confirmDialog('Удалить товар? Он пропадёт из всех слотов.')) return;
  state.drinkLayout = state.drinkLayout.map(r => r.map(p => p === id ? null : p));
  state.snackLayout = state.snackLayout.map(r => r.map(p => p === id ? null : p));
  delete state.products[id];
  saveState();
  closeSheet();
  toast('Товар удалён');
  navigate('catalog');
}

function renderSlotHistory(history) {
  if (history.length === 0) {
    return '<div class="empty" style="padding:28px;"><div class="big" style="font-size:22px;">История пустая</div><p style="font-size:13px;">Первое назначение товара в этот слот появится здесь</p></div>';
  }
  return `
    <div class="list" style="max-height:55vh;overflow-y:auto;-webkit-overflow-scrolling:touch;">
      ${history.map((h, i) => {
        const next = history[i-1]; // более поздний (т.к. unshift)
        const durationMs = next ? (new Date(next.at) - new Date(h.at)) : (Date.now() - new Date(h.at));
        const product = h.productId ? state.products[h.productId] : null;
        const prevProduct = h.prevProductId ? state.products[h.prevProductId] : null;
        return `
          <div class="list-item" style="flex-direction:column;align-items:stretch;gap:6px;">
            <div style="display:flex;align-items:center;gap:10px;">
              ${product ? `<div class="dot cat-${product.cat}"></div>` : '<div class="dot" style="background:var(--text-muted);"></div>'}
              <div class="main-col">
                <div class="name" style="font-size:13px;">
                  ${h.action === 'SET' ? (prevProduct ? `${escapeHtml(prevProduct.name)} → ${escapeHtml(product?.name || '?')}` : `Установлен: ${escapeHtml(product?.name || '?')}`) :
                    h.action === 'CLEAR' ? `Очищен (был: ${escapeHtml(prevProduct?.name || '?')})` : h.action}
                </div>
                <div class="meta mono" style="font-size:10px;">
                  ${formatDateTime(h.at)} · ${escapeHtml(h.by || '—')}
                </div>
              </div>
            </div>
            ${!next ? `<div class="mono" style="font-size:10px;color:var(--accent);">держится уже ${formatDuration(durationMs)}</div>` :
              `<div class="mono" style="font-size:10px;color:var(--text-muted);">простоял ${formatDuration(durationMs)}</div>`
            }
            ${h.note ? `<div style="font-size:11px;color:var(--text-muted);font-style:italic;">${escapeHtml(h.note)}</div>` : ''}
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function switchSlotTab(tab) {
  const pick = document.getElementById('slot_tab_pick');
  const hist = document.getElementById('slot_tab_hist');
  const bp = document.getElementById('tab_pick');
  const bh = document.getElementById('tab_hist');
  if (tab === 'pick') {
    pick.style.display = 'block'; hist.style.display = 'none';
    bp.classList.add('active'); bh.classList.remove('active');
  } else {
    pick.style.display = 'none'; hist.style.display = 'block';
    bp.classList.remove('active'); bh.classList.add('active');
  }
}

function filterSlotOptions(q) {
  const query = q.toLowerCase();
  document.querySelectorAll('.slot-option').forEach(el => {
    el.style.display = el.dataset.name.includes(query) ? 'flex' : 'none';
  });
}

function pickSlot(rIdx, cIdx, pid) {
  const layoutKey = layoutMachine === 'drink' ? 'drinkLayout' : 'snackLayout';
  const machineCode = layoutMachine === 'drink' ? 'ICE' : 'SNACK';
  const prevId = state[layoutKey][rIdx][cIdx];

  // Если ничего не меняется — ничего не делаем
  if (prevId === pid) { closeSheet(); return; }

  // Пишем в историю слотов
  if (!state.slotHistory) state.slotHistory = [];
  state.slotHistory.unshift({
    id: uid(),
    at: nowISO(),
    slotKey: `${machineCode}:${rIdx+1}.${cIdx+1}`,
    machine: machineCode,
    row: rIdx + 1,
    col: cIdx + 1,
    action: pid === null ? 'CLEAR' : 'SET',
    prevProductId: prevId || null,
    productId: pid,
    by: (state.settings.currentUser) || 'admin',
    fromScreen: 'Раскладка',
    note: '',
  });

  state[layoutKey][rIdx][cIdx] = pid;
  saveState();
  closeSheet();
  render();
  toast(pid === null ? 'Слот очищен' : 'Товар назначен');
}

function doTransfer(fromLocId, productId, maxQty) {
  const toLocationId = document.getElementById('t_to').value;
  const quantity = Number(document.getElementById('t_qty').value);
  const note = document.getElementById('t_note').value;
  if (quantity <= 0 || quantity > maxQty) { toast('Некорректное количество', true); return; }

  const from = state.locations[fromLocId], to = state.locations[toLocationId];
  let type = 'TRANSFER_BACK';
  if (from.type === 'WAREHOUSE' && to.type === 'MACHINE_STORAGE') type = 'TRANSFER_TO_STORAGE';
  if (to.type === 'MACHINE') type = 'TRANSFER_TO_MACHINE';

  addMovement({
    productId, fromLocationId: fromLocId, toLocationId, quantity,
    movementType: type, note,
    unitCost: state.products[productId].cost,
  });
  closeSheet();
  toast(`Перемещено ${quantity} шт`);
  render();
}

function openAdjustSheet() {
  const locs = Object.entries(state.locations);
  openSheet({
    title: 'Инвентаризация',
    content: `
      <p style="font-size:13px;color:var(--text-muted);margin-bottom:12px;">Выбери локацию и для каждого товара укажи фактическое количество. Система создаст корректировочные движения.</p>
      <div class="field">
        <label>Локация</label>
        <select id="adj_loc">
          ${locs.map(([id, l]) => `<option value="${id}">${escapeHtml(l.name)}</option>`).join('')}
        </select>
      </div>
      <button class="btn btn-primary btn-full" onclick="loadAdjustItems()">Загрузить товары</button>
      <div id="adj_items" style="margin-top:12px;"></div>
    `,
  });
}

function loadAdjustItems() {
  const locId = document.getElementById('adj_loc').value;
  const items = Object.entries(state.products).map(([pid, p]) => ({
    pid, p, expected: getBalance(locId, pid),
  })).filter(x => x.expected > 0).sort((a, b) => a.p.name.localeCompare(b.p.name));

  document.getElementById('adj_items').innerHTML = `
    <div class="list">
      ${items.map(x => `
        <div class="list-item">
          <div class="dot cat-${x.p.cat}"></div>
          <div class="main-col">
            <div class="name">${escapeHtml(x.p.name)}</div>
            <div class="meta mono">Ожидаемо: ${x.expected}</div>
          </div>
          <div style="width:70px;">
            <input type="number" class="adj-fact" data-pid="${x.pid}" data-expected="${x.expected}" inputmode="numeric" placeholder="${x.expected}" style="padding:6px 8px;text-align:right;" />
          </div>
        </div>
      `).join('')}
    </div>
    <button class="btn btn-primary btn-full" style="margin-top:14px;" onclick="submitAdjust('${locId}')">Провести</button>
  `;
}

function submitAdjust(locId) {
  const facts = document.querySelectorAll('.adj-fact');
  let count = 0;
  facts.forEach(inp => {
    const pid = inp.dataset.pid;
    const expected = Number(inp.dataset.expected);
    const fact = inp.value === '' ? expected : Number(inp.value);
    if (fact !== expected) {
      const diff = fact - expected;
      if (diff > 0) {
        addMovement({ productId: pid, toLocationId: locId, quantity: diff, movementType: 'ADJUSTMENT_PLUS', note: 'Инвентаризация', unitCost: state.products[pid].cost });
      } else {
        addMovement({ productId: pid, fromLocationId: locId, quantity: -diff, movementType: 'ADJUSTMENT_MINUS', note: 'Инвентаризация', unitCost: state.products[pid].cost });
      }
      count++;
    }
  });
  closeSheet();
  toast(count === 0 ? 'Расхождений нет' : `Скорректировано ${count} позиций`);
  render();
}

  state.purchases = state.purchases.filter(p => p.id !== id);

  toast('Удалено');

function getRecentSuppliers(limit) {
  // Подсчитываем закупки по поставщикам
  const counts = {};
  (state.purchases || []).forEach(pu => {
    const k = pu.supplierId || pu.supplier;
    if (k) counts[k] = (counts[k] || 0) + 1;
  });

  return Object.entries(counts)
    .map(([k, count]) => {
      const sup = state.suppliers[k];
      return sup ? { id: k, ...sup, purchaseCount: count } : null;
    })
    .filter(Boolean)
    .sort((a,b) => b.purchaseCount - a.purchaseCount)
    .slice(0, limit);
}

  const data = {

    phone: document.getElementById('sup_phone').value.trim(),
    address: document.getElementById('sup_addr').value.trim(),
    payment: document.getElementById('sup_payment_val').value || 'transfer',

    note: document.getElementById('sup_note').value.trim(),
  };
  if (!data.name) { toast('Укажи название', true); return; }

  let id = sid;
  if (!sid) {
    id = 'sup_' + uid();
    state.suppliers[id] = data;

    if (purchaseDraft && !purchaseDraft.supplierId) {
      purchaseDraft.supplierId = id;
      purchaseDraft.supplier = data.name;
      purchaseDraft.payment = data.payment;
    }

    state.suppliers[sid] = { ...state.suppliers[sid], ...data };

  saveState();
  closeSheet();
  toast(sid ? '✓ Сохранено' : '✓ Поставщик создан');
  render();
}

function editSupplier(sid) {

function deleteSupplier(sid) {
  if (!confirmDialog('Удалить поставщика? История его закупок останется.')) return;
  delete state.suppliers[sid];
  // Если он был выбран в текущей закупке — снимаем
  if (purchaseDraft && purchaseDraft.supplierId === sid) {
    purchaseDraft.supplierId = null;
    purchaseDraft.supplier = '';

  saveState();
  closeSheet();
  toast('Удалён');
  render();
}

let selectedPIProductId = null;
let qtyMode = 'unit'; // 'unit' = цена за шт, 'total' = общая сумма

function selectPIProduct(pid) {
  selectedPIProductId = pid;
  const p = state.products[pid];
  const lastCost = getCurrentCost(pid);
  const editing = editingDraftItemIdx !== null;
  const editItem = editing ? purchaseDraft.items[editingDraftItemIdx] : null;
  const initQty = editItem ? editItem.quantity : 12;
  const initCost = editItem ? editItem.unitCost : (lastCost || 0);
  qtyMode = 'unit';

  document.getElementById('step_pick_product').style.display = 'none';
  document.getElementById('step_qty_price').style.display = 'block';

      <button onclick="adjustQty(-1)">−</button>
      <input id="pi_qty" type="number" inputmode="numeric" value="${initQty}" oninput="recalcLive()" />
      <button onclick="adjustQty(1)">+</button>
    </div>

    <div class="price-mode-tabs">
      <button class="active" id="mode_unit" onclick="setQtyMode('unit')">💵 Цена за штуку</button>
      <button id="mode_total" onclick="setQtyMode('total')">📦 Общая сумма</button>
    </div>

    <div id="price_unit_input">
      <div class="field">
        <label>Цена за единицу (сум)</label>
        <input id="pi_cost" type="number" inputmode="numeric" value="${initCost}" oninput="recalcLive()" placeholder="5000" />
      </div>
    </div>

    <div id="price_total_input" style="display:none;">
      <div class="field">
        <label>Общая сумма за всё количество (сум)</label>
        <input id="pi_total" type="number" inputmode="numeric" placeholder="60000" oninput="recalcLive()" />
      </div>
    </div>

    <div id="live_calc" class="live-calc">—</div>

    <div class="btn-group" style="margin-top:16px;">
      <button class="btn btn-ghost" onclick="backToProductPick()">← Другой товар</button>
      <button class="btn btn-primary" onclick="addItemToDraft()">${editing ? '💾 Сохранить' : '✓ Добавить в корзину'}</button>
    </div>
  `;
  setTimeout(recalcLive, 50);
}

function adjustQty(delta) {
  const inp = document.getElementById('pi_qty');
  const cur = Math.max(1, Number(inp.value) + delta);
  inp.value = cur;
  recalcLive();
}

function setQtyMode(m) {
  qtyMode = m;
  document.getElementById('mode_unit').classList.toggle('active', m === 'unit');
  document.getElementById('mode_total').classList.toggle('active', m === 'total');
  document.getElementById('price_unit_input').style.display = m === 'unit' ? 'block' : 'none';
  document.getElementById('price_total_input').style.display = m === 'total' ? 'block' : 'none';
  recalcLive();
}

function recalcLive() {
  const qty = Number(document.getElementById('pi_qty')?.value) || 0;
  const calc = document.getElementById('live_calc');
  if (!calc || qty <= 0) { if (calc) calc.textContent = '—'; return; }

  let unitCost, total;
  if (qtyMode === 'unit') {
    unitCost = Number(document.getElementById('pi_cost').value) || 0;
    total = qty * unitCost;
  } else {
    total = Number(document.getElementById('pi_total').value) || 0;
    unitCost = qty > 0 ? Math.round(total / qty) : 0;
  }

  if (qty === 0 || (unitCost === 0 && total === 0)) {
    calc.textContent = 'Введи цену';
    return;
  }

  if (qtyMode === 'unit') {
    calc.innerHTML = `<strong>${qty} × ${fmt(unitCost)}</strong> = <strong style="font-size:18px;">${fmt(total)}</strong> сум`;
  } else {
    calc.innerHTML = `<strong>${fmt(total)}</strong> ÷ ${qty} = <strong style="font-size:18px;">${fmt(unitCost)}</strong> сум/шт`;
  }
}

function backToProductPick() {
  selectedPIProductId = null;
  document.getElementById('step_qty_price').style.display = 'none';
  document.getElementById('step_pick_product').style.display = 'block';
  document.querySelector('.sheet-title').textContent = 'Какой товар?';
}

function addItemToDraft() {
  if (!selectedPIProductId) return;
  const qty = Number(document.getElementById('pi_qty').value);
  let unitCost;
  if (qtyMode === 'unit') {
    unitCost = Number(document.getElementById('pi_cost').value);
  } else {
    const total = Number(document.getElementById('pi_total').value);
    unitCost = qty > 0 ? Math.round(total / qty) : 0;
  }
  if (qty <= 0) { toast('Укажи количество', true); return; }
  if (unitCost <= 0) { toast('Укажи цену', true); return; }

  const item = { productId: selectedPIProductId, quantity: qty, unitCost };
  if (editingDraftItemIdx !== null) {
    purchaseDraft.items[editingDraftItemIdx] = item;
    toast('✓ Изменено');
  } else {
    purchaseDraft.items.push(item);
    toast(`✓ +${state.products[selectedPIProductId]?.name} (${qty} шт)`);
  }
  selectedPIProductId = null;
  editingDraftItemIdx = null;
  closeSheet();
  render();
}

function editDraftItem(idx) {
  const it = purchaseDraft.items[idx];
  if (!it) return;
  openAddItemSheet(idx);
  setTimeout(() => selectPIProduct(it.productId), 100);
}

function removeDraftItem(idx) {
  const item = purchaseDraft.items[idx];
  const p = item ? state.products[item.productId] : null;
  if (!confirmDialog(`Убрать ${p?.name || 'позицию'} из корзины?`)) return;
  purchaseDraft.items.splice(idx, 1);
  render();
}

function cancelPurchaseDraft() {
  if (purchaseDraft?.items.length > 0 && !confirmDialog('Отменить? Черновик будет потерян. Используй "💾 Черновик" чтобы сохранить.')) return;
  purchaseDraft = null;
  navigate('purchases');
}

function submitPurchase() {
  if (purchaseDraft.items.length === 0) { toast('Добавь хотя бы один товар', true); return; }

  const noteEl = document.getElementById('pu_note');
  if (noteEl) purchaseDraft.note = noteEl.value;

  const total = purchaseDraft.items.reduce((s, it) => s + it.quantity * it.unitCost, 0);
  const purchaseId = purchaseDraft.id;
  const purchase = {
    ...purchaseDraft,
    total,
    at: purchaseDraft.at + 'T12:00:00',
    status: 'RECEIVED',
    receivedAt: nowISO(),
  };

  // Если был черновик с этим id — заменяем
  state.purchases = state.purchases.filter(p => p.id !== purchaseId);
  state.purchases.unshift(purchase);

  // Создаём stock_movements + price_history
  purchaseDraft.items.forEach(it => {
    const p = state.products[it.productId];
    addMovement({
      productId: it.productId,
      toLocationId: purchaseDraft.warehouseId,
      quantity: it.quantity,
      movementType: 'PURCHASE_IN',
      unitCost: it.unitCost,
      referenceType: 'purchase',
      referenceId: purchaseId,
      note: 'Приход от ' + (purchaseDraft.supplier || '?'),
    });
    if (p && (p.cost || 0) !== it.unitCost) {
      state.priceHistory.unshift({
        id: uid(), productId: it.productId, priceType: 'COST',
        oldPrice: p.cost || 0, newPrice: it.unitCost,
        at: purchase.at, reason: 'Приход от ' + (purchaseDraft.supplier || '?'),
        supplier: purchaseDraft.supplier || '',
        supplierId: purchaseDraft.supplierId || '',
        purchaseId: purchaseId,
        by: (state.settings && state.settings.currentUser) || 'admin',
      });
      p.cost = it.unitCost;
    }
  });

  saveState();
  purchaseDraft = null;
  toast('🎉 Приход оприходован');
  navigate('purchases');
}

function renderPurchaseDetail(root) {
  const pu = state.purchases.find(x => x.id === routeParams.id);

      </div>

function deletePurchase(id) {
  if (!confirmDialog('Удалить приход? Это откатит все связанные движения и остатки.')) return;
  const pu = state.purchases.find(x => x.id === id);
  if (!pu) return;
  // Откат движений и остатков
  const mvs = state.movements.filter(m => m.referenceType === 'purchase' && m.referenceId === id);
  mvs.forEach(m => {
    if (m.toLocationId) {
      const key = m.toLocationId + ':' + m.productId;
      state.balances[key] = (state.balances[key] || 0) - m.quantity;
    }
  });
  state.movements = state.movements.filter(m => !(m.referenceType === 'purchase' && m.referenceId === id));
  state.purchases = state.purchases.filter(x => x.id !== id);
  saveState();
  toast('Приход удалён');
  navigate('purchases');
}

let saleMachine = 'm_icedrink';
let saleItems = {};

function renderSale(root) {
  const machineId = saleMachine;
  const layoutKey = machineId === 'm_icedrink' ? 'drinkLayout' : 'snackLayout';
  const layout = state[layoutKey];

  // Уникальные товары на этом автомате
  const onMachine = {};
  layout.forEach(row => row.forEach(pid => {
    if (pid && !onMachine[pid]) {
      onMachine[pid] = { pid, p: state.products[pid], bal: getBalance(machineId, pid) };
    }
  }));

  const totalItems = Object.values(saleItems).reduce((s, q) => s + Number(q || 0), 0);
  const totalSum = Object.entries(saleItems).reduce((s, [pid, q]) => {
    const p = state.products[pid];
    return s + (Number(q || 0) * (p?.price || 0));
  }, 0);

  root.innerHTML = `
    <div class="screen-h">
      <h2>Продажа</h2>
      <p>Зафиксировать что продано — остатки уменьшатся автоматически</p>
    </div>

    <div class="chips">
      <button class="chip ${saleMachine==='m_icedrink'?'active':''}" onclick="setSaleMachine('m_icedrink')">🥤 Ice Drink</button>
      <button class="chip ${saleMachine==='m_snack'?'active':''}" onclick="setSaleMachine('m_snack')">🍫 Snack</button>
    </div>

    <div class="list">
      ${Object.values(onMachine).sort((a,b) => (b.p?.spd||0) - (a.p?.spd||0)).map(({pid, p, bal}) => {
        if (!p) return '';
        const cur = Number(saleItems[pid] || 0);
        return `
          <div class="list-item" style="flex-direction:column;align-items:stretch;gap:8px;">
            <div style="display:flex;align-items:center;gap:10px;">
              <div class="dot cat-${p.cat}"></div>
              <div class="main-col">
                <div class="name">${escapeHtml(p.name)}</div>
                <div class="meta">${escapeHtml(p.vol||'')} · ${fmt(p.price)} сум/шт</div>
              </div>
              <div style="text-align:right;">
                <div class="mono" style="font-size:13px;font-weight:600;color:${bal===0?'var(--red)':'var(--text)'}">${bal} на авт.</div>
              </div>
            </div>
            <div style="display:flex;gap:6px;align-items:center;">
              <button class="btn btn-ghost" style="padding:4px 12px;font-size:18px;" onclick="decSale('${pid}')">−</button>
              <input type="number" inputmode="numeric" value="${cur}" min="0" max="${bal}" oninput="setSale('${pid}',this.value,${bal})" style="flex:1;text-align:center;padding:8px;font-size:16px;font-weight:600;" />
              <button class="btn btn-ghost" style="padding:4px 12px;font-size:18px;" onclick="incSale('${pid}',${bal})">+</button>
            </div>
            ${cur > 0 ? `<div class="mono" style="font-size:11px;color:var(--emerald);text-align:right;">= ${fmt(cur * p.price)} сум</div>` : ''}
          </div>
        `;
      }).join('')}
    </div>

    ${totalItems > 0 ? `
      <div class="card" style="position:sticky;bottom:calc(80px + var(--safe-bottom));background:var(--bg-elev);border-color:var(--accent);">
        <div style="display:flex;justify-content:space-between;margin-bottom:10px;">
          <span>Итого: ${totalItems} шт</span>
          <span class="mono" style="font-weight:700;color:var(--accent);">${fmt(totalSum)} сум</span>
        </div>
        <button class="btn btn-primary btn-full" onclick="doSale()">Провести продажу</button>
      </div>
    ` : `
      <div class="empty" style="padding:20px;margin-top:14px;">
        <div style="font-size:13px;">Нажми + у товара, чтобы зафиксировать сколько продано</div>
      </div>
    `}
  `;
}

function setSaleMachine(m) { saleMachine = m; saleItems = {}; render(); }
function setSale(pid, v, max) {
  const n = Math.max(0, Math.min(Number(max), Number(v) || 0));
  saleItems[pid] = n;
  // Не перерисовываем всё — только сумму обновим
  render();
}
function incSale(pid, max) { saleItems[pid] = Math.min(max, (Number(saleItems[pid]) || 0) + 1); render(); }
function decSale(pid) { saleItems[pid] = Math.max(0, (Number(saleItems[pid]) || 0) - 1); render(); }

function doSale() {
  const items = Object.entries(saleItems).filter(([, q]) => Number(q) > 0);
  if (items.length === 0) { toast('Ничего не выбрано', true); return; }

  // Проверка остатков
  for (const [pid, q] of items) {
    const bal = getBalance(saleMachine, pid);
    if (bal < Number(q)) {
      toast(`Недостаточно ${state.products[pid]?.name}: ${bal} < ${q}`, true);
      return;
    }
  }

  items.forEach(([pid, q]) => {
    const p = state.products[pid];
    addMovement({
      productId: pid,
      fromLocationId: saleMachine,
      quantity: Number(q),
      movementType: 'SALE',
      unitCost: p?.cost || 0,
      unitPrice: p?.price || 0,
      note: 'Продажа (ручная регистрация)',
    });
  });

  saleItems = {};
  toast(`Продано ${items.length} позиций`);
  navigate('dashboard');
}

// ============================================================
// REFILL
// ============================================================

let refillMachine = 'm_icedrink';
let refillItems = {};

function renderRefill(root) {
  const machineId = refillMachine;
  const layoutKey = machineId === 'm_icedrink' ? 'drinkLayout' : 'snackLayout';
  const storageId = machineId === 'm_icedrink' ? 'st_icedrink' : 'st_snack';
  const layout = state[layoutKey];
  // Определяем fromLocationId заранее для подсчёта max
  const currentFromLoc = (state._refillFromLoc) || 'wh_olma';

  // Уникальные товары в раскладке
  const slots = {};
  layout.forEach((row, ri) => row.forEach((pid, ci) => {
    if (pid) {
      if (!slots[pid]) slots[pid] = { count: 0, positions: [] };
      slots[pid].count++;
      slots[pid].positions.push(`${ri+1}.${ci+1}`);
    }
  }));

  root.innerHTML = `
    <div class="screen-h">
      <h2>Заправка</h2>
      <p>Перенос со склада в автомат</p>
    </div>

    <div class="chips">
      <button class="chip ${refillMachine==='m_icedrink'?'active':''}" onclick="setRefillMachine('m_icedrink')">🥤 Ice Drink</button>
      <button class="chip ${refillMachine==='m_snack'?'active':''}" onclick="setRefillMachine('m_snack')">🍫 Snack</button>
    </div>

    <div class="card" style="background:var(--bg-elev-2);">
      <div class="card-head">
        <div class="card-title" style="font-size:13px;">Откуда берём</div>
      </div>
      <select id="from_loc" onchange="setRefillFromLoc(this.value)">
        <option value="wh_olma" ${currentFromLoc==='wh_olma'?'selected':''}>Склад OLMA</option>
        <option value="${storageId}" ${currentFromLoc===storageId?'selected':''}>Хранилище автомата</option>
      </select>
    </div>

    <div class="list">
      ${Object.entries(slots).map(([pid, info]) => {
        const p = state.products[pid];
        if (!p) return '';
        const onMachineQty = getBalance(machineId, pid);
        const onSource = getBalance(currentFromLoc, pid);
        const capacity = info.count * (p.cap || 8);
        const needed = Math.max(0, capacity - onMachineQty);
        const canRefill = Math.min(needed, onSource);
        const pct = Math.min(100, (onMachineQty / capacity) * 100);
        const currentVal = Number(refillItems[pid] || 0);
        return `
          <div class="list-item" style="flex-direction:column;align-items:stretch;gap:8px;">
            <div style="display:flex;align-items:center;gap:10px;">
              <div class="dot cat-${p.cat}"></div>
              <div class="main-col">
                <div class="name">${escapeHtml(p.name)}</div>
                <div class="meta">${info.count} спир. · поз. ${info.positions.slice(0,3).join(', ')}${info.positions.length>3?'...':''}</div>
              </div>
              <div style="text-align:right;">
                <div class="mono" style="font-size:13px;font-weight:600;">${onMachineQty}/${capacity}</div>
                <div class="mono" style="font-size:10px;color:${needed>0?(onSource>=needed?'var(--accent)':'var(--red)'):'var(--emerald)'}">
                  ${needed>0 ? (onSource>=needed ? `надо ${needed}` : `только ${onSource}/${needed}`) : 'полный'}
                </div>
              </div>
            </div>
            <div class="progress"><div class="progress-bar" style="width:${pct}%;"></div></div>
            <div style="display:flex;gap:6px;align-items:center;">
              <button class="btn btn-ghost" style="padding:4px 10px;" onclick="decRefill('${pid}')" ${currentVal===0?'disabled style="opacity:0.4;"':''}>−</button>
              <input type="number" inputmode="numeric" value="${currentVal}" min="0" max="${canRefill}" oninput="setRefill('${pid}',this.value,${canRefill})" style="flex:1;text-align:center;padding:6px;" />
              <button class="btn btn-ghost" style="padding:4px 10px;" onclick="incRefill('${pid}',${canRefill})" ${currentVal>=canRefill?'disabled style="opacity:0.4;"':''}>+</button>
              <button class="btn btn-primary" style="padding:4px 10px;font-size:11px;" onclick="fillToMax('${pid}',${canRefill})" ${canRefill===0?'disabled style="opacity:0.4;"':''}>Макс</button>
            </div>
          </div>
        `;
      }).join('')}
    </div>

    <div class="card" style="position:sticky;bottom:calc(80px + var(--safe-bottom));">
      <div style="display:flex;justify-content:space-between;margin-bottom:10px;">
        <span>К заправке:</span>
        <span class="mono" style="font-weight:700;color:var(--accent);">${Object.values(refillItems).reduce((a,b)=>a+Number(b||0),0)} шт</span>
      </div>
      <button class="btn btn-primary btn-full" onclick="doRefill()">Провести заправку</button>
    </div>
  `;
}

function setRefillMachine(m) { refillMachine = m; refillItems = {}; render(); }
function setRefillFromLoc(loc) { state._refillFromLoc = loc; refillItems = {}; render(); }
function setRefill(pid, v, max) {
  const n = Math.max(0, Math.min(Number(max || 999), Number(v) || 0));
  refillItems[pid] = n;
  render();
}
function incRefill(pid, max) { refillItems[pid] = Math.min(max, (Number(refillItems[pid]) || 0) + 1); render(); }
function decRefill(pid) { refillItems[pid] = Math.max(0, (Number(refillItems[pid]) || 0) - 1); render(); }
function fillToMax(pid, max) { refillItems[pid] = max; render(); }

function doRefill() {
  const fromLocationId = (state._refillFromLoc) || 'wh_olma';
  const toLocationId = refillMachine;
  const items = Object.entries(refillItems).filter(([, q]) => Number(q) > 0);
  if (items.length === 0) { toast('Нечего заправлять', true); return; }

  // Проверяем хватает ли на складе
  for (const [pid, q] of items) {
    const avail = getBalance(fromLocationId, pid);
    if (avail < Number(q)) {
      toast(`Недостаточно ${state.products[pid]?.name} (${avail} < ${q})`, true);
      return;
    }
  }

  items.forEach(([pid, q]) => {
    addMovement({
      productId: pid, fromLocationId, toLocationId,
      quantity: Number(q),
      movementType: 'TRANSFER_TO_MACHINE',
      unitCost: state.products[pid].cost,
      note: 'Заправка автомата',
    });
  });

  refillItems = {};
  toast(`Заправлено ${items.length} позиций`);
  render();
}

function updateWOAvail() {
  const pid = document.getElementById('wo_pid')?.value;
  const locId = document.getElementById('wo_loc')?.value;
  if (!pid || !locId) return;
  const avail = getBalance(locId, pid);
  const el = document.getElementById('wo_avail');
  if (el) el.innerHTML = `Доступно: <span style="color:${avail>0?'var(--emerald)':'var(--red)'};font-weight:600;">${avail}</span> шт`;
  const qtyInp = document.getElementById('wo_qty');
  if (qtyInp) qtyInp.max = avail;
}

function doWriteoff() {
  const pid = document.getElementById('wo_pid').value;
  const locId = document.getElementById('wo_loc').value;
  const qty = Number(document.getElementById('wo_qty').value);
  const reason = document.getElementById('wo_reason').value;
  const note = document.getElementById('wo_note').value;

  const avail = getBalance(locId, pid);
  if (qty <= 0 || qty > avail) { toast('Некорректное количество', true); return; }

  addMovement({
    productId: pid, fromLocationId: locId, quantity: qty,
    movementType: 'WRITE_OFF', unitCost: state.products[pid].cost,
    note: `${reason}${note ? ': ' + note : ''}`,
  });
  toast('Списано');
  navigate('dashboard');
}

// Парсинг CSV/TSV строки с учётом кавычек
function parseCSVLine(line, sep) {
  const result = [];
  let cur = '', inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQuotes && line[i+1] === '"') { cur += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if (c === sep && !inQuotes) {
      result.push(cur.trim());
      cur = '';
    } else {
      cur += c;
    }
  }
  result.push(cur.trim());
  return result;
}

function detectSeparator(text) {
  // Берём первую строку и считаем popular separators
  const firstLine = text.split('\n')[0];
  const commas = (firstLine.match(/,/g) || []).length;
  const semis = (firstLine.match(/;/g) || []).length;
  const tabs = (firstLine.match(/\t/g) || []).length;
  if (tabs > commas && tabs > semis) return '\t';
  if (semis > commas) return ';';
  return ',';
}

async function handleSalesFile(file) {
  if (!file) return;
  const ext = (file.name.split('.').pop() || '').toLowerCase();
  toast('📂 Читаю ' + file.name);

  try {
    if (ext === 'xlsx' || ext === 'xls') {
      // Конвертируем Excel в CSV через SheetJS из CDN
      await loadXLSXLib();
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const csv = XLSX.utils.sheet_to_csv(ws, { FS: ';' });
      processSalesText(csv, file.name);
    } else {
      let text = await file.text();
      // Стрип UTF-8 BOM
      if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);
      processSalesText(text, file.name);
    }
  } catch (e) {
    toast('Ошибка чтения: ' + e.message, true);
  }
}

let xlsxLoaded = false;
async function loadXLSXLib() {
  if (xlsxLoaded) return;
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
    s.onload = () => { xlsxLoaded = true; resolve(); };
    s.onerror = () => reject(new Error('Не удалось загрузить XLSX-библиотеку (нужен интернет)'));
    document.head.appendChild(s);
  });
}

function processSalesText(text, fileName) {
  // Стрип BOM если ещё остался
  if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);

  const sep = detectSeparator(text);
  const rawLines = text.split(/\r?\n/).filter(l => l.trim());
  if (rawLines.length < 2) { toast('Файл пустой или нет данных', true); return; }

  // Чистим табы внутри ячеек (формат HICON добавляет \t после названий)
  const lines = rawLines.map(l => l.replace(/\t/g, ''));

  const rows = lines.map(l => parseCSVLine(l, sep));
  const headers = rows[0].map(h => h.trim());
  let dataRows = rows.slice(1);

  // Распознаём формат HICON по заголовкам
  const lowerHeaders = headers.map(h => h.toLowerCase().trim());
  const isHICON = lowerHeaders.includes('productid') && lowerHeaders.includes('product name');

  // Фильтруем служебные строки: Total, пустые, с "其他" без ProductID
  dataRows = dataRows.filter(r => {
    if (!r.length || r.every(v => !v.trim())) return false;
    if (isHICON) {
      const firstCell = (r[0] || '').trim().toLowerCase();
      // Строка "Total" в конце
      if (firstCell === 'total' || firstCell === 'итого') return false;
      // Строка "其他" (other) без ProductID
      if (!r[0].trim() && r[2] && r[2].trim() === '其他') return false;
      // Любая другая строка без ProductID — подозрительная
      if (!r[0].trim() && r[2] && !r[2].includes('其他')) {
        // Оставляем, но с notice
        return true;
      }
    }
    return true;
  });

  // Извлекаем дату из имени файла (формат HICON: Product_name2026-4-21_15_34_44.csv)
  const dateFromFilename = extractDateFromFilename(fileName);

  // Автомаппинг колонок
  const guess = guessColumns(headers, dataRows.slice(0, 5));
  // Для HICON: приоритетные маппинги
  if (isHICON) {
    guess.productCol = lowerHeaders.indexOf('product name');
    guess.qtyCol = lowerHeaders.indexOf('quantity');
    // "Pay by cash" = общая сумма за все штуки, делим на qty внутри
    guess.totalAmountCol = lowerHeaders.indexOf('total amount');
    if (guess.totalAmountCol < 0) guess.totalAmountCol = lowerHeaders.indexOf('pay by cash');
    guess.productIdCol = lowerHeaders.indexOf('productid');
    guess.priceCol = -1; // считаем из total/qty
  }

  salesImportData = {
    fileName,
    sep,
    headers,
    dataRows,
    mapping: guess,
    machineId: 'm_icedrink',
    format: isHICON ? 'HICON' : 'custom',
    reportDate: dateFromFilename || today(),
  };

  openSalesMappingSheet();
}

function extractDateFromFilename(fileName) {
  // Формат HICON: Product_name2026-4-21_15_34_44.csv → 2026-04-21T15:34:44
  const m = fileName.match(/(\d{4})-(\d{1,2})-(\d{1,2})_?(\d{1,2})?[_-]?(\d{1,2})?[_-]?(\d{1,2})?/);
  if (m) {
    const yr = m[1];
    const mo = m[2].padStart(2, '0');
    const dy = m[3].padStart(2, '0');
    const hr = (m[4] || '12').padStart(2, '0');
    const mn = (m[5] || '00').padStart(2, '0');
    const sc = (m[6] || '00').padStart(2, '0');
    return `${yr}-${mo}-${dy}T${hr}:${mn}:${sc}`;
  }
  return null;
}

function guessColumns(headers, sample) {
  const lower = headers.map(h => h.toLowerCase());
  const find = (...keywords) => {
    for (let i = 0; i < lower.length; i++) {
      if (keywords.some(k => lower[i].includes(k))) return i;
    }
    return -1;
  };
  return {
    productCol: find('товар', 'продукт', 'наименов', 'name', 'product', 'item'),
    qtyCol: find('кол-во', 'количество', 'qty', 'quantity', 'amount'),
    priceCol: find('цена', 'price', 'стоим', 'unit price'),
    totalAmountCol: find('total amount', 'сумма', 'общая', 'итого', 'pay by cash'),
    txnIdCol: find('productid', 'commodity', 'транзакц', 'чек', 'receipt', 'txn'),
  };
}

    priceCol: Number(document.getElementById('map_price').value),
    txnIdCol: Number(document.getElementById('map_txn').value),
  };

  if (d.mapping.productCol < 0) { toast('Выбери колонку с товаром', true); return; }

  // Группируем по уникальным названиям товаров из файла
  const productNames = new Set();
  d.dataRows.forEach(r => {
    const name = cleanProductName(r[d.mapping.productCol] || '');
    if (name) productNames.add(name);
  });

  // Авто-маппинг с каталогом по похожести
  const productMap = {};
  for (const fileName of productNames) {
    productMap[fileName] = autoMatchProduct(fileName);
  }
  d.productMap = productMap;
  d.uniqueProducts = [...productNames];

  openProductMatchSheet();
}

// Чистим название: убираем табы, множественные пробелы, 其他 если он затесался
function cleanProductName(raw) {
  return String(raw || '').replace(/\t/g, '').replace(/\s+/g, ' ').trim();
}

function normalizeProductName(s) {
  return String(s || '').toLowerCase()
    .replace(/\t/g, '')
    // 250ml, 500ml → 0.25, 0.5 (без \b перед ml — он не работает в JS перед буквой)
    .replace(/(\d+)\s*ml/gi, (_, n) => {
      const num = parseInt(n);
      return (num / 1000).toString();
    })
    .replace(/(\d+)\s*g\b/gi, (_, n) => n + 'g') // граммы оставляем
    // cocacola → coca cola
    .replace(/cocacola/g, 'coca cola')
    .replace(/fusetea/g, 'fuse tea')
    .replace(/redbull/g, 'red bull')
    // убираем служебные слова
    .replace(/\b(can|pet|bottle|бутылка|банка)\b/gi, '')
    // всё кроме букв/цифр/точек → пробел
    .replace(/[^\wа-яёa-z0-9.]+/gi, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

// Бренды (должны совпадать точно для буста)
const KNOWN_BRANDS = ['coca', 'cola', 'pepsi', 'fanta', 'sprite', 'redbull', 'red', 'bull',
  'fuse', 'tea', 'fusetea', 'lipton', 'nesquick', 'borjomi', 'moxito', 'mojito', 'laimon',
  'flash', 'plus', 'omaf', 'ozbegim', 'bonaqua', 'hayat',
  'snickers', 'twix', 'bounty', 'kitkat', 'milkyway', 'picnic', 'kinder', 'bueno',
  'strobar', 'barni', 'oreo', 'contic', 'velona',
  'lays', 'pringles', 'cheers', 'tuc', '7days', 'flint', 'ermak'];

function autoMatchProduct(fileName) {
  const normFile = normalizeProductName(fileName);
  const fileWords = normFile.split(' ').filter(w => w.length >= 2);
  const fileWordsSet = new Set(fileWords);
  const fileBrands = new Set(fileWords.filter(w => KNOWN_BRANDS.includes(w)));

  let bestMatch = null;
  let bestScore = 0;

  for (const [pid, p] of Object.entries(state.products)) {
    const normCat = normalizeProductName(p.name + ' ' + (p.vol || ''));
    const catWords = normCat.split(' ').filter(w => w.length >= 2);
    const catWordsSet = new Set(catWords);
    const catBrands = new Set(catWords.filter(w => KNOWN_BRANDS.includes(w)));

    // Общие слова
    let common = 0;
    for (const w of fileWordsSet) if (catWordsSet.has(w)) common++;
    if (common === 0) continue;

    // Jaccard
    const union = new Set([...fileWordsSet, ...catWordsSet]).size;
    let score = common / union;

    // Brand match: если в файле есть бренд, он должен быть в каталоге
    if (fileBrands.size > 0) {
      let brandMatch = 0;
      for (const b of fileBrands) if (catBrands.has(b)) brandMatch++;
      const brandRatio = brandMatch / fileBrands.size;
      // Если ни один бренд не совпал — это точно не то
      if (brandRatio === 0 && catBrands.size > 0) {
        score = score * 0.2; // сильный штраф
      } else {
        score = score * 0.5 + brandRatio * 0.5; // усредняем
      }
    }

    // Бонус за точное вхождение
    if (normCat === normFile) score = 1.0;
    else if (normCat.includes(normFile) || normFile.includes(normCat)) score += 0.15;

    if (score > bestScore) {
      bestScore = score;
      bestMatch = pid;
    }
  }

  return bestScore >= 0.4 ? bestMatch : null;
}
