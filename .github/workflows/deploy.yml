# ═══════════════════════════════════════
# VendHub24 — Deploy Pipeline
# ═══════════════════════════════════════
# Builds Docker images and deploys to staging/production
# Triggered on push to main (production) or develop (staging)

name: Deploy

on:
  # Disabled auto-push: Railway deploys from source via ci.yml
  # push:
  #   branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/vendhub
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # ─── Quality Gate (lint + typecheck before deploy) ───
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter "@vendhub/shared" build

      - name: TypeScript type check
        run: pnpm type-check

      - name: ESLint
        run: pnpm lint

  # ─── Build & Push Docker Images ───
  build-images:
    name: Build ${{ matrix.app }}
    needs: quality-gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - app: api
            context: .
            dockerfile: apps/api/Dockerfile
          - app: web
            context: .
            dockerfile: apps/web/Dockerfile
          - app: client
            context: .
            dockerfile: apps/client/Dockerfile.dev
          - app: site
            context: .
            dockerfile: apps/site/Dockerfile
          - app: bot
            context: .
            dockerfile: apps/bot/Dockerfile
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.app }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value={{sha}},enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

  # ─── Deploy to Server ───
  deploy:
    name: Deploy to ${{ github.ref == 'refs/heads/main' && 'Production' || 'Staging' }}
    runs-on: ubuntu-latest
    needs: build-images
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
      url: ${{ github.ref == 'refs/heads/main' && 'https://vendhubweb-production.up.railway.app' || 'https://staging.vendhub.uz' }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/vendhub
            git pull origin ${{ github.ref_name }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            echo "⏳ Waiting for API container to be ready..."
            sleep 10
            docker compose -f docker-compose.prod.yml exec -T api node dist/cli migrate
            echo "✅ VendHub deployed and migrations applied successfully"

  # ─── Post-Deploy Health Check ───
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for services
        run: sleep 30

      - name: Check API health
        env:
          HEALTH_URL: ${{ github.ref == 'refs/heads/main' && 'https://vendhubapi-production.up.railway.app' || 'https://api-staging.vendhub.uz' }}
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf "${HEALTH_URL}/api/v1/health"; then
              echo "✅ API health check passed"
              exit 0
            fi
            echo "⏳ Attempt $i/5 failed, retrying in 10s..."
            sleep 10
          done
          echo "❌ API health check failed after 5 attempts"
          exit 1

      - name: Check Admin Panel
        env:
          PANEL_URL: ${{ github.ref == 'refs/heads/main' && 'https://vendhubweb-production.up.railway.app' || 'https://staging.vendhub.uz' }}
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf "${PANEL_URL}"; then
              echo "✅ Admin panel health check passed"
              exit 0
            fi
            echo "⏳ Attempt $i/5 failed, retrying in 10s..."
            sleep 10
          done
          echo "❌ Admin panel health check failed after 5 attempts"
          exit 1
