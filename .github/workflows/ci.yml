name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # ========================================
  # Lint & Type Check
  # ========================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter "@vendhub/shared" build

      - name: Run security audit
        run: pnpm audit --audit-level=critical

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          severity: "CRITICAL"
          exit-code: "1"

      - name: Run ESLint
        run: pnpm lint

      - name: Run TypeScript check
        run: pnpm type-check

  # ========================================
  # Unit Tests
  # ========================================
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter "@vendhub/shared" build

      - name: Run API unit tests
        run: pnpm --filter api test:unit --forceExit --passWithNoTests
        env:
          CI: true

      - name: Run web unit tests
        run: pnpm --filter web test -- --runInBand --forceExit
        env:
          CI: true

      - name: Run client unit tests
        run: pnpm --filter client test
        env:
          CI: true

      - name: Run site unit tests
        run: pnpm --filter site test -- --passWithNoTests
        env:
          CI: true

      - name: Run mobile unit tests
        run: pnpm --filter mobile test -- --passWithNoTests
        env:
          CI: true

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./apps/api/coverage/lcov.info
          fail_ci_if_error: false
          flags: unittests
          name: api-coverage

  # ========================================
  # Build
  # ========================================
  build:
    name: Build All Apps
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter "@vendhub/shared" build

      - name: Build API
        run: pnpm --filter api build

      - name: Build Web (Admin Panel)
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

      - name: Build Client (Mini App)
        run: pnpm --filter client build
        env:
          VITE_API_URL: http://localhost:4000

      - name: Build Site (Landing Page)
        run: pnpm --filter @vendhub/site build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

      - name: Build Mobile (type-check only, no native build in CI)
        run: pnpm --filter mobile type-check

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/api/dist
            apps/web/.next
            apps/client/dist
            apps/site/.next
          retention-days: 7

  # ========================================
  # Integration Tests
  # ========================================
  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vendhub
          POSTGRES_PASSWORD: vendhub_dev
          POSTGRES_DB: vendhub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter "@vendhub/shared" build

      - name: Run migrations
        run: pnpm --filter api migration:run
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: vendhub
          DB_PASSWORD: vendhub_dev
          DB_NAME: vendhub_test

      - name: Run integration tests
        run: pnpm --filter api test:integration --forceExit --passWithNoTests
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: vendhub
          DB_PASSWORD: vendhub_dev
          DB_NAME: vendhub_test
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          REDIS_PASSWORD: ""
          JWT_SECRET: test-jwt-secret-key-for-ci-minimum-32-chars
          JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci-minimum-32
          COOKIE_SECRET: test-cookie-secret-for-ci
          NODE_ENV: test
          CI: true

  # ========================================
  # E2E Tests
  # ========================================
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vendhub
          POSTGRES_PASSWORD: vendhub_dev
          POSTGRES_DB: vendhub_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter "@vendhub/shared" build

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run migrations
        run: pnpm --filter api migration:run
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: vendhub
          DB_PASSWORD: vendhub_dev
          DB_NAME: vendhub_e2e

      - name: Seed test data
        run: pnpm --filter api db:seed
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: vendhub
          DB_PASSWORD: vendhub_dev
          DB_NAME: vendhub_e2e

      - name: Start API server
        run: |
          nohup pnpm --filter api start:prod > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid
          echo "API server started with PID $(cat /tmp/api.pid)"
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_USER: vendhub
          DB_PASSWORD: vendhub_dev
          DB_NAME: vendhub_e2e
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
          REDIS_PASSWORD: ""
          JWT_SECRET: test-jwt-secret-key-for-ci-minimum-32-chars
          JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci-minimum-32
          COOKIE_SECRET: test-cookie-secret-for-ci
          NODE_ENV: test
          PORT: "4000"

      - name: Start web server
        run: |
          nohup pnpm --filter web start > /tmp/web.log 2>&1 &
          echo $! > /tmp/web.pid
          echo "Web server started with PID $(cat /tmp/web.pid)"
        env:
          HOSTNAME: "0.0.0.0"
          PORT: "3000"
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NODE_ENV: test

      - name: Start client server
        run: |
          nohup pnpm --filter client preview -- --host 0.0.0.0 --port 5173 > /tmp/client.log 2>&1 &
          echo $! > /tmp/client.pid
          echo "Client server started with PID $(cat /tmp/client.pid)"
        env:
          VITE_API_URL: http://localhost:4000
          NODE_ENV: test

      - name: Wait for all servers to be ready
        run: |
          echo "Waiting for API..."
          timeout 60 bash -c 'until curl -s http://localhost:4000/api/v1/health > /dev/null 2>&1; do
            if ! kill -0 $(cat /tmp/api.pid) 2>/dev/null; then
              echo "API process died! Logs:"
              cat /tmp/api.log
              exit 1
            fi
            sleep 2
          done'
          echo "API is healthy"

          echo "Waiting for Web..."
          timeout 60 bash -c 'until curl -s http://localhost:3000 > /dev/null 2>&1; do
            if ! kill -0 $(cat /tmp/web.pid) 2>/dev/null; then
              echo "Web process died! Logs:"
              cat /tmp/web.log
              exit 1
            fi
            sleep 2
          done'
          echo "Web is healthy"

          echo "Waiting for Client..."
          timeout 60 bash -c 'until curl -s http://localhost:5173 > /dev/null 2>&1; do
            if ! kill -0 $(cat /tmp/client.pid) 2>/dev/null; then
              echo "Client process died! Logs:"
              cat /tmp/client.log
              exit 1
            fi
            sleep 2
          done'
          echo "Client is healthy"

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          API_URL: http://localhost:4000
          WEB_URL: http://localhost:3000
          CLIENT_URL: http://localhost:5173

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ========================================
  # Load Test (Smoke)
  # ========================================
  load-test-smoke:
    name: Load Test (Smoke)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: vendhub_loadtest
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm --filter api build

      - name: Run migrations
        run: pnpm db:migrate
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: vendhub_loadtest
          DB_USER: postgres
          DB_PASSWORD: postgres

      - name: Start API and run k6 smoke test
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: vendhub_loadtest
          DB_USER: postgres
          DB_PASSWORD: postgres
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-jwt-secret-for-ci
          COOKIE_SECRET: test-cookie-secret
          K6_BASE_URL: http://localhost:4000
        run: |
          cd apps/api && node dist/main.js &
          sleep 10
          curl -f http://localhost:4000/api/v1/health || exit 1
          cd ../.. && k6 run tests/load/smoke.js

  # ========================================
  # Docker Build
  # ========================================
  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-unit, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DOCKER_REGISTRY_ENABLED == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: vendhub/api
          tags: |
            type=ref,event=branch
            type=sha,prefix=

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner on API
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: vendhub/api:${{ github.sha }}
          format: "sarif"
          output: "trivy-results-api.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy scan results for API
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results-api.sarif"
          category: "api-image"

      - name: Extract metadata for Web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: vendhub/web
          tags: |
            type=ref,event=branch
            type=sha,prefix=

      - name: Build and push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner on Web
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: vendhub/web:${{ github.sha }}
          format: "sarif"
          output: "trivy-results-web.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy scan results for Web
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results-web.sarif"
          category: "web-image"

      - name: Extract metadata for Client
        id: meta-client
        uses: docker/metadata-action@v5
        with:
          images: vendhub/client
          tags: |
            type=ref,event=branch
            type=sha,prefix=

      - name: Build and push Client image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/client/Dockerfile.dev
          push: true
          tags: ${{ steps.meta-client.outputs.tags }}
          labels: ${{ steps.meta-client.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Bot removed — Telegram bots now embedded in API service (telegram-bot module)

      - name: Run Trivy vulnerability scanner on Client
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: vendhub/client:${{ github.sha }}
          format: "sarif"
          output: "trivy-results-client.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy scan results for Client
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results-client.sarif"
          category: "client-image"

      - name: Extract metadata for Site
        id: meta-site
        uses: docker/metadata-action@v5
        with:
          images: vendhub/site
          tags: |
            type=ref,event=branch
            type=sha,prefix=

      - name: Build and push Site image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/site/Dockerfile
          push: true
          tags: ${{ steps.meta-site.outputs.tags }}
          labels: ${{ steps.meta-site.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ========================================
  # Deploy to Railway
  # Project: [see RAILWAY_PROJECT_ID secret]
  # GitHub Secret required: RAILWAY_TOKEN
  # ========================================
  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: [test-unit, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy API service
        run: railway up --service "@vendhub/api" --environment production --detach

      - name: Deploy Web (admin panel)
        run: railway up --service "@vendhub/web" --environment production --detach

      - name: Deploy Client PWA
        run: railway up --service "@vendhub/client" --environment production --detach

      - name: Run database migrations
        run: |
          echo "Waiting 30s for API to come up..."
          sleep 30
          railway run --service "@vendhub/api" --environment production -- pnpm db:migrate

      - name: Notify Telegram
        if: always()
        continue-on-error: true
        env:
          JOB_STATUS: ${{ job.status }}
          REF_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        uses: appleboy/telegram-action@v0.1.1
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            VendHub Railway Deployment

            Status: ${{ job.status }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}

            Project: [see RAILWAY_PROJECT_ID secret]
