# Railway project configuration
# https://docs.railway.app/reference/config-as-code
#
# Monorepo setup: each service in Railway Dashboard must set its Root Directory
#
#   Service  | Root Directory | railway.toml location
#   ---------|----------------|----------------------
#   api      | apps/api       | apps/api/railway.toml  ← has migration release command
#   web      | apps/web       | (this file applies)
#   client   | apps/client    | (this file applies)
#   bot      | apps/bot       | (this file applies)
#   site     | apps/site      | (this file applies)
#
# Service overview:
#   api     → @vendhub/api     (NestJS, port 4000)
#   web     → @vendhub/web     (Next.js admin, port 3000)
#   client  → @vendhub/client  (Vite SPA, served via npx serve)
#   bot     → @vendhub/bot     (Telegram bot, no HTTP)
#   site    → @vendhub/site    (Next.js landing, port 3100)

[build]
buildCommand = ""

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
