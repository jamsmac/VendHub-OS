# ==================================================
# VendHub Secrets Template
# ==================================================
# USAGE: This file uses envsubst placeholders.
# Before applying to Kubernetes, process with:
#   envsubst < secrets.yml | kubectl apply -f -
#
# For production, prefer:
#   - Sealed Secrets (bitnami-labs/sealed-secrets)
#   - External Secrets Operator (external-secrets.io)
#   - HashiCorp Vault with CSI driver
# ==================================================
apiVersion: v1
kind: Secret
metadata:
  name: vendhub-secrets
  namespace: vendhub
  labels:
    app.kubernetes.io/name: vendhub
    app.kubernetes.io/component: secrets
type: Opaque
# NOTE: values must be base64-encoded when using 'data' field.
# Using 'stringData' here for readability — envsubst fills in values
# before applying to the cluster.
stringData:
  # Database
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "vendhub"
  DB_USER: "$DB_USER"
  DB_PASSWORD: "$DB_PASSWORD"

  # Redis
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: "$REDIS_PASSWORD"

  # JWT
  JWT_SECRET: "$JWT_SECRET"
  JWT_REFRESH_SECRET: "$JWT_REFRESH_SECRET"

  # Telegram
  TELEGRAM_BOT_TOKEN: "$TELEGRAM_BOT_TOKEN"

  # Payment Providers
  PAYME_MERCHANT_ID: "$PAYME_MERCHANT_ID"
  PAYME_SECRET_KEY: "$PAYME_SECRET_KEY"
  CLICK_MERCHANT_ID: "$CLICK_MERCHANT_ID"
  CLICK_SERVICE_ID: "$CLICK_SERVICE_ID"
  CLICK_SECRET_KEY: "$CLICK_SECRET_KEY"

  # External Services
  SENTRY_DSN: "$SENTRY_DSN"
  SMTP_HOST: "$SMTP_HOST"
  SMTP_USER: "$SMTP_USER"
  SMTP_PASSWORD: "$SMTP_PASSWORD"

  # Storage (MinIO/S3)
  STORAGE_ACCESS_KEY: "$STORAGE_ACCESS_KEY"
  STORAGE_SECRET_KEY: "$STORAGE_SECRET_KEY"

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: vendhub
  labels:
    app.kubernetes.io/name: vendhub
    app.kubernetes.io/component: database
type: Opaque
stringData:
  POSTGRES_USER: "$DB_USER"
  POSTGRES_PASSWORD: "$DB_PASSWORD"
  POSTGRES_DB: "vendhub"

---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secrets
  namespace: vendhub
  labels:
    app.kubernetes.io/name: vendhub
    app.kubernetes.io/component: cache
type: Opaque
stringData:
  REDIS_PASSWORD: "$REDIS_PASSWORD"
