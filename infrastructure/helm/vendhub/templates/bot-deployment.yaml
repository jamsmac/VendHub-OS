{{- if .Values.bot.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vendhub.fullname" . }}-bot
  labels:
    {{- include "vendhub.bot.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "vendhub.bot.selectorLabels" . | nindent 6 }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "vendhub.bot.selectorLabels" . | nindent 8 }}
    spec:
      {{- include "vendhub.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      initContainers:
        - name: wait-for-api
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ include "vendhub.fullname" . }}-api {{ .Values.api.service.port }}; do sleep 2; done;']
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Release.Name }}-redis-master 6379; do sleep 2; done;']
      containers:
        - name: bot
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.bot.image.repository }}:{{ .Values.bot.image.tag }}"
          imagePullPolicy: {{ .Values.bot.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "vendhub.fullname" . }}-config
            - secretRef:
                name: {{ include "vendhub.fullname" . }}-secrets
          env:
            - name: PORT
              value: "3001"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "vendhub.fullname" . }}-redis-secret
                  key: redis-password
          resources:
            {{- toYaml .Values.bot.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vendhub.fullname" . }}-bot
  labels:
    {{- include "vendhub.bot.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "vendhub.bot.selectorLabels" . | nindent 4 }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "vendhub.fullname" . }}-bot
spec:
  minAvailable: 1
  selector:
    matchLabels:
      {{- include "vendhub.bot.selectorLabels" . | nindent 6 }}
{{- end }}
