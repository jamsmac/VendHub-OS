# ==============================================================================
# VendHub OS - Production Docker Compose
# ==============================================================================
# Usage:
#   docker-compose -f docker-compose.prod.yml up -d
#   docker-compose -f docker-compose.prod.yml logs -f
#   docker-compose -f docker-compose.prod.yml down
# ==============================================================================

services:
  # ============================================================================
  # API Service
  # ============================================================================
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        - NODE_ENV=production
    image: vendhub/api:${IMAGE_TAG:-latest}
    container_name: vendhub-api
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vendhub}
      - DB_USER=${DB_USER:-vendhub}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      - API_PORT=4000
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - PAYME_MERCHANT_ID=${PAYME_MERCHANT_ID}
      - PAYME_SECRET_KEY=${PAYME_SECRET_KEY}
      - CLICK_MERCHANT_ID=${CLICK_MERCHANT_ID}
      - CLICK_SECRET_KEY=${CLICK_SECRET_KEY}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
      - STORAGE_ENDPOINT=${STORAGE_ENDPOINT:-minio:9000}
      - STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY}
      - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY}
      - STORAGE_BUCKET=${STORAGE_BUCKET:-vendhub}
      - UZUM_MERCHANT_ID=${UZUM_MERCHANT_ID:-}
      - UZUM_SECRET_KEY=${UZUM_SECRET_KEY:-}
      - CLICK_SERVICE_ID=${CLICK_SERVICE_ID:-}
      - SMS_PROVIDER=${SMS_PROVIDER:-eskiz}
      - SMS_API_KEY=${SMS_API_KEY:-}
      - SMS_SENDER_ID=${SMS_SENDER_ID:-VendHub}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-noreply@vendhub.uz}
      - OFD_ENABLED=${OFD_ENABLED:-false}
      - OFD_API_URL=${OFD_API_URL:-}
      - OFD_API_KEY=${OFD_API_KEY:-}
      - TELEGRAM_WEBHOOK_URL=${TELEGRAM_WEBHOOK_URL:-}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - METRICS_API_KEY=${METRICS_API_KEY:-}
      - DB_MIGRATIONS_RUN=true
      - CORS_ORIGINS=${CORS_ORIGINS:-https://vendhubweb-production.up.railway.app,https://vendhubclient-production.up.railway.app}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - vendhub-network
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ============================================================================
  # Web (Admin Panel)
  # ============================================================================
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        - NODE_ENV=production
        - NEXT_PUBLIC_API_URL=${API_URL:-https://vendhubapi-production.up.railway.app}
    image: vendhub/web:${IMAGE_TAG:-latest}
    container_name: vendhub-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${API_URL:-https://vendhubapi-production.up.railway.app}
    ports:
      - "3000:3000"
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - vendhub-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ============================================================================
  # Client (Telegram Mini App)
  # ============================================================================
  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
      args:
        - NODE_ENV=production
        - VITE_API_URL=${API_URL:-https://vendhubapi-production.up.railway.app}
    image: vendhub/client:${IMAGE_TAG:-latest}
    container_name: vendhub-client
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - vendhub-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ============================================================================
  # Site (Landing Page)
  # ============================================================================
  site:
    build:
      context: .
      dockerfile: apps/site/Dockerfile
      args:
        - NODE_ENV=production
        - NEXT_PUBLIC_API_URL=${API_URL:-https://vendhubapi-production.up.railway.app}
    image: vendhub/site:${IMAGE_TAG:-latest}
    container_name: vendhub-site
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    ports:
      - "3100:3100"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3100/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - vendhub-network
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Telegram Bots — now embedded in API service (telegram-bot module)
  # Staff Bot: TELEGRAM_BOT_TOKEN
  # Customer Bot: TELEGRAM_CUSTOMER_BOT_TOKEN
  # See apps/api/src/modules/telegram-bot/ for implementation

  # ============================================================================
  # PostgreSQL Database
  # ============================================================================
  postgres:
    image: postgres:16-alpine
    container_name: vendhub-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME:-vendhub}
      - POSTGRES_USER=${DB_USER:-vendhub}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./infrastructure/postgres/extensions.sql:/docker-entrypoint-initdb.d/02-extensions.sql:ro
    # No ports exposed in production - accessible only via Docker network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER:-vendhub} -d ${DB_NAME:-vendhub}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vendhub-network
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G
        reservations:
          cpus: "0.5"
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    command:
      - "postgres"
      # Connection limits
      - "-c"
      - "max_connections=300"
      # Memory (tuned for 4GB instance: 25% shared_buffers, 75% effective_cache)
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "effective_cache_size=3GB"
      - "-c"
      - "work_mem=16MB"
      - "-c"
      - "maintenance_work_mem=256MB"
      # WAL
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=64MB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"
      # Planner
      - "-c"
      - "default_statistics_target=200"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      # Logging (audit-friendly)
      - "-c"
      - "log_statement=mod"
      - "-c"
      - "log_min_duration_statement=500"
      - "-c"
      - "log_checkpoints=on"
      - "-c"
      - "log_connections=on"
      - "-c"
      - "log_disconnections=on"
      - "-c"
      - "log_lock_waits=on"
      # Performance extensions
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"

  # ============================================================================
  # Redis Cache
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: vendhub-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis-data:/data
    # No ports exposed in production - accessible only via Docker network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vendhub-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ============================================================================
  # MinIO Object Storage
  # ============================================================================
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: vendhub-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${STORAGE_ACCESS_KEY:?STORAGE_ACCESS_KEY is required}
      - MINIO_ROOT_PASSWORD=${STORAGE_SECRET_KEY:?STORAGE_SECRET_KEY is required}
    volumes:
      - minio-data:/data
    # MinIO API port accessible only via Docker network; console disabled in production
    expose:
      - "9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - vendhub-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ============================================================================
  # NGINX Reverse Proxy
  # ============================================================================
  nginx:
    image: nginx:alpine
    container_name: vendhub-nginx
    restart: unless-stopped
    volumes:
      - ./infrastructure/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/ssl:/etc/nginx/ssl:ro
      - nginx-cache:/var/cache/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
      - web
      - client
      - site
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - vendhub-network
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

# ==============================================================================
# Networks
# ==============================================================================
networks:
  vendhub-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# ==============================================================================
# Volumes
# ==============================================================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local
  nginx-cache:
    driver: local
