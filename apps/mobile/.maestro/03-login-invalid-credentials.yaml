# E2E: Login with invalid credentials shows error
appId: uz.vendhub.staff

---
- assertVisible: "VendHub"

# Enter wrong credentials
- tapOn:
    hint: "Email"
- inputText: "wrong@example.com"

- tapOn:
    hint: "Пароль"
- inputText: "wrongpassword"

- tapOn: "Войти"

# Should show error alert
- assertVisible:
    text: "Ошибка входа"
    timeout: 10000
- tapOn: "OK"
