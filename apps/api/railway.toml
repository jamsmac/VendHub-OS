# Railway configuration for VendHub API service
#
# IMPORTANT: In Railway Dashboard → API service → Settings:
#   Root Directory: /  (repo root, NOT apps/api)
#   The Dockerfile needs monorepo context (pnpm-workspace.yaml, packages/, etc.)

[build]
dockerfilePath = "apps/api/Dockerfile"
watchPatterns = ["apps/api/**", "packages/shared/**", "package.json", "pnpm-lock.yaml", "pnpm-workspace.yaml"]

[deploy]
# Release command runs AFTER build, BEFORE start — perfect for migrations
# This runs in the production container (compiled dist/ is available)
releaseCommand = "node -e \"const ds=require('./dist/database/typeorm.config').default;ds.initialize().then(()=>ds.runMigrations()).then(r=>{console.log('Migrations run:',r.length);process.exit(0)}).catch(e=>{console.error('Migration failed:',e.message);process.exit(1)})\""

startCommand = "node dist/main.js"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
